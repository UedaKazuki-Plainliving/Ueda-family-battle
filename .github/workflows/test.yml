name: Tests

on:
  push:
    paths:
      - 'street-brawler.html'
      - 'run-tests.js'
      - 'run-bdd-tests.js'
      - 'e2e/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'street-brawler.html'
      - 'run-tests.js'
      - 'run-bdd-tests.js'
      - 'e2e/**'

jobs:
  unit-tests:
    name: Unit Tests (vm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: node run-tests.js

  bdd-tests:
    name: BDD Tests (Gherkin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run BDD tests
        run: node run-bdd-tests.js

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: npm install @playwright/test && npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npx playwright test e2e/game.spec.js --reporter=line
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
