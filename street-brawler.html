<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>大乱闘　ウエダファミリー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow: hidden; }
  #wrap { position: relative; width: 100vw; }
  canvas { display: block; width: 100vw; height: auto; touch-action: none; -webkit-user-select: none; user-select: none; }
  /* タッチ端末でcanvas+操作UIがビューポートに収まるよう高さから逆算してwidthを制限 */
  @media (pointer: coarse) {
    canvas { width: min(100vw, calc((100svh - 165px) * 800 / 450)); }
  }
  #nav-ctrls {
    display: flex; justify-content: center; align-items: center; gap: 24px;
    padding: 10px 0; background: #111; width: 100%;
  }
  #fight-ctrls {
    display: none;
    position: relative; width: 100%; background: #111;
    padding: 8px 10px; user-select: none;
  }
  .ctrl-row { display: flex; justify-content: space-between; align-items: center; }
  .dpad { position: relative; width: 168px; height: 126px; }
  .dpad-btn {
    position: absolute; background: rgba(255,255,255,0.13); border: 2px solid rgba(255,255,255,0.25);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; touch-action: none;
  }
  .dpad-btn:active, .dpad-btn.active { background: rgba(255,255,255,0.35); }

  #btn-right   { left: 84px; top: 42px;  width: 42px; height: 42px; }
  #btn-up      { left: 42px; top: 0;     width: 42px; height: 42px; }
  #btn-down    { left: 42px; top: 84px;  width: 42px; height: 42px; }
  #btn-upleft  { left: 0;    top: 0;     width: 38px; height: 38px; font-size: 15px; }
  #btn-upright { left: 88px; top: 0;     width: 38px; height: 38px; font-size: 15px; }
  .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .abtn {
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(255,255,255,0.13); border: 2px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 11px; font-weight: bold; text-align: center;
    display: flex; align-items: center; justify-content: center;

  #btn-block { border-color: #aaa; color: #aaa; }

    padding: 10px 22px; border-radius: 8px; background: rgba(255,255,255,0.12);

<script>
'use strict';
const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450, GROUND = 340;
const EXIT_BTN = {x:5, y:5, w:52, h:24};
let CANVAS_H = H; // 2Pタッチ時は600に拡張

function setup2PTouchCanvas() {
  canvas.height = 600; CANVAS_H = 600;
  canvas.style.cssText = 'display:block;height:100dvh;width:auto;max-width:100vw;touch-action:none;-webkit-user-select:none;user-select:none;';
}
function resetCanvas() {
  canvas.height = H; CANVAS_H = H;
  canvas.style.cssText = 'display:block;width:100vw;height:auto;touch-action:none;-webkit-user-select:none;user-select:none;';
}

// ---- Seeded PRNG (gameplay uses this for determinism across clients) ----
let _rngState = 1;
function seedRng(s) { _rngState = ((s >>> 0) || 1); }
function gameRand() {
  _rngState ^= _rngState << 13;
  _rngState ^= _rngState >>> 17;
  _rngState ^= _rngState << 5;
  return (_rngState >>> 0) / 4294967296;
}

// ---- Audio ----
const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, type, dur, vol = 0.25) {
  try {
    const o = audio.createOscillator(), g = audio.createGain();
    o.connect(g); g.connect(audio.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
    o.start(); o.stop(audio.currentTime + dur);
  } catch(e) {}
}

// ---- Input ----
const keys = {};
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    const inFight = phase==='fight'||phase==='roundend'||phase==='countdown';
    if (inFight) { exitToMenu(); return; }
    // intro/modeselect/charselect: treat Escape as Backspace (go back)
  }
  keys[e.code] = true; e.preventDefault();
});
document.addEventListener('keyup',   e => { keys[e.code] = false; });
function keyOnce(code) { if (keys[code]) { keys[code] = false; return true; } return false; }

// Touch binding helpers — use both touch and pointer events for reliability
function bindHold(el, code) {
  const on  = e => { e.preventDefault(); keys[code] = true;  el.classList.add('active'); };
  const off = e => { e.preventDefault(); keys[code] = false; el.classList.remove('active'); };
  el.addEventListener('pointerdown',   on,  {passive: false});
  el.addEventListener('pointerup',     off, {passive: false});
  el.addEventListener('pointercancel', off, {passive: false});
  el.addEventListener('pointerleave',  off, {passive: false});
  el.addEventListener('touchstart',    on,  {passive: false});
  el.addEventListener('touchend',      off, {passive: false});
  el.addEventListener('touchcancel',   off, {passive: false});
}
function bindTap(el, code) {
  const on  = e => { e.preventDefault(); keys[code] = true; };
  const off = e => { e.preventDefault(); keys[code] = false; };
  el.addEventListener('pointerdown', on,  {passive: false});
  el.addEventListener('pointerup',   off, {passive: false});
  el.addEventListener('touchstart',  on,  {passive: false});
  el.addEventListener('touchend',    off, {passive: false});
}

bindHold(document.getElementById('btn-left'),    'KeyA');
bindHold(document.getElementById('btn-right'),   'KeyD');
bindHold(document.getElementById('btn-up'),      'KeyW');
bindHold(document.getElementById('btn-down'),    'KeyS');
// 斜めボタン: 2キー同時
function bindHold2(el, code1, code2) {
  const on  = e => { e.preventDefault(); keys[code1]=true;  keys[code2]=true;  el.classList.add('active'); };
  const off = e => { e.preventDefault(); keys[code1]=false; keys[code2]=false; el.classList.remove('active'); };
  el.addEventListener('pointerdown',   on,  {passive: false});
  el.addEventListener('pointerup',     off, {passive: false});
  el.addEventListener('pointercancel', off, {passive: false});
  el.addEventListener('pointerleave',  off, {passive: false});
  el.addEventListener('touchstart',    on,  {passive: false});
  el.addEventListener('touchend',      off, {passive: false});
  el.addEventListener('touchcancel',   off, {passive: false});
}
bindHold2(document.getElementById('btn-upleft'),  'KeyW', 'KeyA');
bindHold2(document.getElementById('btn-upright'), 'KeyW', 'KeyD');
bindHold(document.getElementById('btn-punch'),   'KeyJ');
bindHold(document.getElementById('btn-kick'),    'KeyK');
bindHold(document.getElementById('btn-block'),   'KeyL');
bindHold(document.getElementById('btn-special'), 'Space');
bindTap(document.getElementById('nav-left'),  'ArrowLeft');
bindTap(document.getElementById('nav-right'), 'ArrowRight');
bindTap(document.getElementById('nav-ok'),    'Enter');

// Prevent all default touch behavior (zoom, scroll, callout) for the game
document.addEventListener('touchstart',  e => e.preventDefault(), {passive: false});

document.addEventListener('touchend',    e => e.preventDefault(), {passive: false});
document.addEventListener('touchcancel', e => e.preventDefault(), {passive: false});

// Canvas tap handler for charselect & intro
canvas.addEventListener('pointerdown', e => {
  if (audio.state === 'suspended') audio.resume();
  const inFight = phase==='fight'||phase==='roundend'||phase==='countdown';
  if (inFight) {
    const rect = canvas.getBoundingClientRect();
    const ex = (e.clientX - rect.left) * (W / rect.width);
    const ey = (e.clientY - rect.top)  * (H / rect.height);
    if (ex>=EXIT_BTN.x&&ex<=EXIT_BTN.x+EXIT_BTN.w&&ey>=EXIT_BTN.y&&ey<=EXIT_BTN.y+EXIT_BTN.h) {
      exitToMenu(); return;
    }
  }
  if (phase === 'intro') { keys['Enter'] = true; return; }
  if (phase === 'modeselect' || phase === 'charselect' || phase === 'netwait') {
    const rect2 = canvas.getBoundingClientRect();
    const bex = (e.clientX - rect2.left) * (W / rect2.width);
    const bey = (e.clientY - rect2.top)  * (H / rect2.height);
    if (bex >= 12 && bex <= 100 && bey >= H-42 && bey <= H-14) {
      if (phase === 'netwait') {
        if(netWs){try{netWs.close();}catch(ex){} netWs=null;}
        phase='modeselect'; beep(300,'sine',0.08); return;
      }
      if (phase === 'charselect') {
        if (gameMode==='net') {
          if(netWs){try{netWs.close();}catch(ex){} netWs=null;}
          phase='modeselect'; beep(300,'sine',0.08); return;
        }
        if (selectStep === 1) { selectStep = 0; beep(300,'sine',0.08); return; }
        modeSelectStep=0; phase='modeselect'; beep(300,'sine',0.08); return;
      }
      if (modeSelectStep === 1) { modeSelectStep=0; beep(300,'sine',0.08); return; }
      phase='intro'; beep(300,'sine',0.08); return;
    }
  }
  if (phase === 'modeselect') {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const ty = (e.clientY - rect.top) * scaleY;
    if (modeSelectStep === 1) {
      if (ty >= 200 && ty < 260) { cpuDifficulty='weak'; beep(350,'sine',0.08); }
      else if (ty >= 280 && ty < 340) { cpuDifficulty='normal'; beep(350,'sine',0.08); }
      else if (ty >= 360 && ty < 420) { cpuDifficulty='strong'; beep(350,'sine',0.08); }
      keys['Enter'] = true; return;
    }
    if (ty >= 130 && ty < 205) { gameMode='cpu'; beep(350,'sine',0.08); modeSelectStep=1; return; }
    else if (ty >= 230 && ty < 305) { gameMode='2p'; beep(350,'sine',0.08); keys['Enter'] = true; }
    else if (ty >= 330 && ty < 405) { gameMode='net'; beep(350,'sine',0.08); connectNet(); }
    return;
  }
  if (phase === 'charselect') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY2 = H / rect.height;
    const tx = (e.clientX - rect.left) * scaleX;
    const tcy = (e.clientY - rect.top) * scaleY2;
    const CS_COLS=4, CS_PW=190, CS_PH=185, CS_GAP=8, CS_SX=8, CS_SY=68;
    for (let idx=0; idx<CHAR_LIST.length; idx++) {
      const col=idx%CS_COLS, row=Math.floor(idx/CS_COLS);
      const px=CS_SX+col*(CS_PW+CS_GAP), py=CS_SY+row*(CS_PH+CS_GAP);
      if (tx>=px&&tx<=px+CS_PW&&tcy>=py&&tcy<=py+CS_PH) {
        if (gameMode==='net') selectedCharIdx=idx;
        else if (selectStep===0) selectedCharIdx=idx;
        else cpuCharIdx=idx;
        beep(350,'sine',0.08);
        break;
      }
    }
  }
});

// Show/hide fight vs nav controls
if (IS_TOUCH) {

    const inFight = phase === 'fight' || phase === 'roundend' || phase === 'countdown';
    // 2P mode uses canvas buttons, not HTML buttons

  let bx = 0;
  while (bx < W) {
    const bw = 80 + rng(bx,bx+1)*60, bh = 100 + rng(bx+2,bw)*140;
    const wins = [];
    for (let wy = GROUND-bh+15; wy < GROUND-12; wy+=22)
      for (let wx = bx+8; wx < bx+bw-18; wx+=22)
        if (rng(wx,wy)%3!==0) wins.push([wx,wy]);
    buildings.push({x:bx,w:bw,h:bh,wins}); bx+=bw-10;
  }
})();

function drawBackground() {
  const sky = ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#100828'); sky.addColorStop(1,'#3a1808');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,GROUND);
  ctx.fillStyle='#fff8d0'; ctx.beginPath(); ctx.arc(680,60,28,0,Math.PI*2); ctx.fill();

  buildings.forEach(b => {

}

// ---- Effects ----
const effects = [];
let screenFlash = {t:0, color:'#fff'};
let specialBanner = {name:'', color:'#fff', t:0};
let superFlash = {t:0, color:'#fff', ox:400, oy:225};

function spawnHit(x,y,big=false) {
  effects.push({x,y,t:big?25:18,big});
  beep(big?280:420+Math.random()*180,'square',big?0.2:0.12,big?0.7:0.5);
}
function drawEffects() {
  for (let i=effects.length-1;i>=0;i--) {
    const e=effects[i], maxT=e.big?25:18;
    const a=e.t/maxT, sz=(e.big?40:22)*(2-a);
    ctx.globalAlpha=a;
    ctx.strokeStyle=e.big?'#ff8800':'#ffe040'; ctx.lineWidth=e.big?5:3;
    for (let k=0;k<(e.big?12:8);k++) {
      const ang=k/(e.big?12:8)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(e.x,e.y);
      ctx.lineTo(e.x+Math.cos(ang)*sz,e.y+Math.sin(ang)*sz); ctx.stroke();
    }
    ctx.globalAlpha=1;
    if (--e.t<=0) effects.splice(i,1);
  }
}

function triggerSpecialFlash(def) {
  screenFlash = {t:14, color: def.c1};
  specialBanner = {name: def.specialName, color: def.c1, t:90};
}
function triggerSuperFlash(def, ox, oy) {
  screenFlash = {t:10, color: '#ffffff'};
  specialBanner = {name: '超必殺！'+def.superName, color: def.c1, t:115};
  superFlash = {t:55, color: def.c1, ox: ox??400, oy: (oy??225)-65};
  beep(800,'sawtooth',0.3,0.5); setTimeout(()=>beep(1200,'square',0.22,0.4),100);
}
function drawSuperFlash() {
  if (superFlash.t<=0) return;
  const cx=superFlash.ox, cy=superFlash.oy, col=superFlash.color, t=superFlash.t;
  if (t>40) {
    const a=(t-40)/15*0.92;
    ctx.globalAlpha=a; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=5; ctx.globalAlpha=a*0.6;
    for (let i=0;i<16;i++) {
      const ang=i/16*Math.PI*2, len=(1-(t-40)/15)*W*1.2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*len,cy+Math.sin(ang)*len); ctx.stroke();
    }
  } else if (t>15) {
    const prog=(t-15)/25;
    ctx.globalAlpha=prog*0.42; ctx.fillStyle=col; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=3; ctx.globalAlpha=prog*0.75;
    for (let r=0;r<3;r++) {
      const radius=(1-prog)*W*0.9+r*90;
      ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.stroke();
    }
    ctx.strokeStyle=col; ctx.lineWidth=7; ctx.globalAlpha=prog*0.9;
    ctx.beginPath(); ctx.arc(cx,cy,(1-prog)*W*0.55+25,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    for (let i=0;i<10;i++) {
      const ang=i/10*Math.PI*2+(1-prog)*Math.PI*2;
      const r1=50+prog*160, r2=r1+50+prog*70;
      ctx.globalAlpha=prog*(0.3+0.7*(Math.sin(t*0.9+i*1.1)*0.5+0.5));
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(ang)*r1,cy+Math.sin(ang)*r1);
      ctx.lineTo(cx+Math.cos(ang)*r2,cy+Math.sin(ang)*r2); ctx.stroke();
    }
  } else {
    ctx.globalAlpha=t/15*0.28; ctx.fillStyle=col; ctx.fillRect(0,0,W,H);
  }
  ctx.globalAlpha=1; superFlash.t--;
}

function drawScreenFlash() {
  if (screenFlash.t<=0) return;
  const a = (screenFlash.t/14)*0.55;
  ctx.globalAlpha=a; ctx.fillStyle=screenFlash.color;
  ctx.fillRect(0,0,W,H);
  if (screenFlash.t>8) {
    ctx.globalAlpha=(screenFlash.t-8)/6*0.5; ctx.strokeStyle=screenFlash.color; ctx.lineWidth=6;
    for (let i=0;i<12;i++) {
      const ang=i/12*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(W/2,H/2);
      ctx.lineTo(W/2+Math.cos(ang)*W,H/2+Math.sin(ang)*H); ctx.stroke();
    }
  }
  ctx.globalAlpha=1; screenFlash.t--;
}

function drawSpecialBanner() {
  if (specialBanner.t<=0) return;
  const fade = specialBanner.t>78?(90-specialBanner.t)/12 : specialBanner.t<18?specialBanner.t/18:1;

function updateProjectiles(p1,p2) {
  for (let i=projectiles.length-1;i>=0;i--) {
    const proj=projectiles[i];
    proj.x+=proj.vx;
    if (proj.type==='fireball') {
      proj.vy+=0.35; proj.y+=proj.vy;
      if (proj.y>=GROUND-8&&proj.bounced<3){proj.y=GROUND-8;proj.vy=-(3+gameRand()*2);proj.bounced++;beep(180,'sine',0.03,0.08);}
    } else if (proj.type==='hammer') {
      proj.vy+=0.25; proj.y+=proj.vy;
      if (proj.y>GROUND+5){projectiles.splice(i,1);continue;}
    } else if (proj.vy!==undefined){proj.vy+=0.18;proj.y+=proj.vy;
      if(proj.y>=GROUND+5){projectiles.splice(i,1);continue;}
    }
    if (--proj.t<=0||proj.x<-100||proj.x>W+100){projectiles.splice(i,1);continue;}
    const target=proj.owner===p1?p2:p1;
    if (target.hp<=0||target.hitStun>0) continue;
    const hurt=target.hurtbox();
    const isCentered=proj.type==='hammer'||proj.type==='mushroom';
    const px=isCentered?proj.x-22:(proj.vx>0?proj.x-5:proj.x-65);
    const pw=isCentered?44:70;
    if (px<hurt.x+hurt.w&&px+pw>hurt.x&&proj.y-20<hurt.y+hurt.h&&proj.y+20>hurt.y) {
      if (target.takeHit({dmg:proj.dmg,stun:proj.stun,push:proj.push,type:'special'},proj.vx>0?1:-1)) {
        if (proj.type==='ice') target.frozenFrames=Math.max(target.frozenFrames,140);
        if (proj.type==='baseball'||proj.type==='fire') proj.owner.specialGauge=Math.min(proj.owner.maxSpecialGauge,proj.owner.specialGauge+20);
        spawnHit(target.x,target.y-70);
        if (proj.type!=='dragon') projectiles.splice(i,1);
      }
    }
  }
}

// ---- Hurdle Attack (そよ special) ----
let hurdleAttack = null;
function activateHurdles(owner, target) {
  const positions=[-80,-25,30,85].map(o=>target.x+o);
  hurdleAttack={positions, ys:positions.map(()=>GROUND+5), owner, elapsed:0, t:130, hit:new Set()};
}
function updateHurdles(p1,p2) {
  if (!hurdleAttack) return;
  if (--hurdleAttack.t<=0){hurdleAttack=null;return;}
  hurdleAttack.elapsed++;
  hurdleAttack.positions.forEach((px,i)=>{
    const delay=i*14, local=hurdleAttack.elapsed-delay;
    if (local<=0){hurdleAttack.ys[i]=GROUND+5;return;}
    if (local<18) hurdleAttack.ys[i]=GROUND-local*4.5;
    else if (local<38) hurdleAttack.ys[i]=GROUND-81;
    else { hurdleAttack.ys[i]=GROUND-81+(local-38)*4.5; if(hurdleAttack.ys[i]>GROUND) hurdleAttack.ys[i]=GROUND+5; }
    if (hurdleAttack.ys[i]<GROUND-10) {
      [p1,p2].forEach((f,fi)=>{
        if (f===hurdleAttack.owner) return;
        const key=`${i}-${fi}`; if (hurdleAttack.hit.has(key)) return;
        const hurt=f.hurtbox();
        if (px-38<hurt.x+hurt.w&&px+38>hurt.x&&hurdleAttack.ys[i]<hurt.y+hurt.h&&hurdleAttack.ys[i]+20>hurt.y) {
          if (f.takeHit({dmg:10,stun:16,push:10,type:'special'},px<f.x?-1:1)) {
            hurdleAttack.hit.add(key); spawnHit(f.x,f.y-50);
          }
        }
      });
    }
  });
}
function drawHurdles() {
  if (!hurdleAttack) return;
  hurdleAttack.positions.forEach((px,i)=>{
    const y=hurdleAttack.ys[i]; if (y>=GROUND) return;
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px-22,GROUND); ctx.lineTo(px-22,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+22,GROUND); ctx.lineTo(px+22,y); ctx.stroke();
    ctx.strokeStyle='#ffdd00'; ctx.lineWidth=9;
    ctx.beginPath(); ctx.moveTo(px-36,y); ctx.lineTo(px+36,y); ctx.stroke();
    ctx.strokeStyle='rgba(255,200,0,0.3)'; ctx.lineWidth=18;
    ctx.beginPath(); ctx.moveTo(px-36,y); ctx.lineTo(px+36,y); ctx.stroke();
  });
}

// ---- Word Attack (おとうさん special) ----
const WORDS = ['うまい','なぜ','そうか','まじで','へぇ','なるほど','ところで','そういえば','ちなみに','まあまあ','いやいや','うん','ほんとに','すごい','やっぱり','でもさ','あのね','とにかく','ちょっと待って','それよりも'];
let wordProjs = [];
function activateWordAttack(owner) {
  const count=6;
  for (let i=0;i<count;i++) {
    const ang=(i/count)*Math.PI*2+gameRand()*0.4-0.2;

      text:word,t:80,owner,hit:false,color:`hsl(${Math.floor(Math.random()*360)},80%,70%)`});
  }
}
function updateWords(p1,p2) {
  for (let i=wordProjs.length-1;i>=0;i--) {
    const w=wordProjs[i];
    w.x+=w.vx; w.y+=w.vy; w.vy+=0.06;
    if (--w.t<=0){wordProjs.splice(i,1);continue;}
    if (!w.hit) {
      const target=w.owner===p1?p2:p1;

      const hurt=target.hurtbox();

        }
      }
    }
  }
}
function drawWords() {

    ctx.fillStyle=w.color; ctx.fillText(w.text,w.x,w.y);
    ctx.globalAlpha=1;
  });
}

// ---- BlackHole (おとうさん super) ----
class BlackHole {
  constructor(owner,target){
    this.owner=owner; this.target=target;
    this.x=target.x+(owner.x<target.x?25:-25);
    this.y=target.y-75; this.t=180; this.r=0; this.hit=false;
  }
  update(p1,p2){
    if(--this.t<=0||this.hit){activeBlackHole=null;return;}
    this.r=Math.min(48,this.r+0.38);
    const target=this.owner===p1?p2:p1;
    const dx=this.x-target.x, dy=this.y-target.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<this.r+28){
      const dir=target.x>=this.x?1:-1;
      if(target.takeHit({dmg:62,stun:70,push:0,type:'special',knockdown:true},dir)){
        spawnHit(this.x,this.y);
        target.vy=-15; target.onGround=false; target.airVx=dir*14;
        this.hit=true; activeBlackHole=null;
      }
      return;
    }
    if(dist<220&&!target.hitStun&&!target.frozenFrames&&target.state!=='super'){
      const pull=0.85*(1-dist/220);
      target.x+=dx/dist*pull;
    }
  }
  draw(){
    if(!this.r||this.hit)return;
    const cx=this.x, cy=this.y, now=Date.now();
    ctx.save();
    ctx.globalAlpha=0.4+0.2*Math.sin(now/110);
    ctx.strokeStyle='#9900ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx,cy,this.r+20,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.65; ctx.strokeStyle='#ff00ff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,this.r+7,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,this.r);
    g.addColorStop(0,'rgba(0,0,0,1)');
    g.addColorStop(0.5,'rgba(40,0,70,0.92)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,this.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(180,0,255,0.55)'; ctx.lineWidth=1.5; ctx.globalAlpha=0.7;
    for(let i=0;i<3;i++){
      const ang=now/180+i*(Math.PI*2/3);
      ctx.beginPath(); ctx.arc(cx,cy,this.r*0.65,ang,ang+Math.PI*0.75); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.restore();
    ctx.fillStyle='#cc44ff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('ブラックホール',cx,cy-this.r-10);
  }
}

// ---- Fighter ----
class Fighter {
  constructor(x,facingRight,def) {
    this.x=x; this.y=GROUND; this.vy=0; this.airVx=0;
    this.dir=facingRight?1:-1; this.def=def;
    this.hp=100; this.maxHp=100;
    this.state='idle'; this.st=0;
    this.onGround=true; this.hitStun=0; this.blockStun=0;
    this.atkHit=false; this.af=0; this.atick=0;
    this.specialGauge=20; this.maxSpecialGauge=100;
    this.specialVx=0; this.specialFired=false;
    this.superFired=false; this.superPhase=0; this.superTargetX=0; this.superOriginX=0; this.superHitActive=0;
    this.frozenFrames=0; this.dmgDebuff=0;
    this.punchFired=false; this.guardFlash=0; this.guardMode=false;
    this.comboCount=0; this.invincFrames=0;
    this.pose=null;
  }
  hurtbox() {
    const s=this.def.scale;
    if (this.state==='crouch') return {x:this.x-24*s,y:this.y-82*s,w:48*s,h:82*s};
    return {x:this.x-28*s,y:this.y-125*s,w:56*s,h:125*s};
  }
  hitbox() {
    const d=this.dir,s=this.def.scale,def=this.def,rb=def.rangeBonus??1;
    if (this.state==='special'&&def.id==='yuuri')
      return {x:this.x+d*8,y:this.y-88*s,w:d*95*s,h:58*s};
    if (this.state==='super'&&def.id==='yuuri'&&this.superPhase===1)
      return {x:this.x-55*s,y:this.y-80*s,w:110*s,h:80*s};
    if (this.state==='super'&&def.id==='soyo')
      return {x:this.x+this.dir*4*s,y:this.y-128*s,w:this.dir*52*s,h:128*s};
    if (this.state==='special'&&def.id==='luigi'&&this.superPhase===1)
      return {x:this.x+d*4*s,y:this.y-118*s,w:d*50*s,h:118*s};
    if (this.state==='super'&&def.id==='luigi'&&this.superPhase===1)
      return {x:this.x+d*4*s,y:this.y-118*s,w:d*58*s,h:118*s};
    if (this.state==='super'&&def.id==='kirby'&&(this.superPhase===1||this.superPhase===3))
      return {x:this.x+d*4*s,y:this.y-112*s,w:d*70*s,h:112*s};
    if (this.state==='punch'&&!def.punchIsProjectile&&this.st>=def.punchS&&this.st<=def.punchE)
      return {x:this.x+d*14*s,y:this.y-92*s,w:d*40*s*rb,h:50*s};
    if (this.state==='kick'&&this.st>=def.kickS&&this.st<=def.kickE)
      return {x:this.x+d*14*s,y:this.y-62*s,w:d*88*s*rb,h:32*s};
    if (this.state==='jatk'&&this.st>=def.jatkS&&this.st<=def.jatkE)
      return {x:this.x+d*5*s,y:this.y-120*s,w:d*55*s*rb,h:Math.max(120*s,GROUND-this.y+30*s)};
    if (this.state==='jkick'&&this.st>=def.kickS&&this.st<=def.kickE)
      return {x:this.x+d*8*s,y:this.y-70*s,w:d*70*s*rb,h:Math.max(70*s,GROUND-this.y+20*s)};
    return null;
  }
  damageInfo() {
    const def=this.def;
    let info=null;
    if (this.state==='super'&&def.id==='yuuri'&&this.superPhase===1) info={dmg:55,stun:60,push:12,type:'special',knockdown:true};
    else if (this.state==='super'&&def.id==='soyo') info={dmg:26,stun:50,push:20,type:'special'};
    else if (this.state==='special'&&def.id==='yuuri') info={dmg:35,stun:42,push:60,type:'special'};
    else if (this.state==='special'&&def.id==='luigi'&&this.superPhase===1) info={dmg:22,stun:30,push:35,type:'special'};
    else if (this.state==='super'&&def.id==='luigi'&&this.superPhase===1) info={dmg:44,stun:50,push:50,type:'special'};
    else if (this.state==='super'&&def.id==='kirby'&&this.superPhase===1) info={dmg:22,stun:30,push:26,type:'special'};
    else if (this.state==='super'&&def.id==='kirby'&&this.superPhase===3) info={dmg:44,stun:45,push:42,type:'special',knockdown:true};
    else if (this.state==='punch') info={dmg:def.punchDmg,stun:def.hitStunGiven,push:def.pushback,type:'punch'};
    else if (this.state==='kick')  info={dmg:def.kickDmg, stun:def.hitStunGiven,push:def.pushback,type:'kick'};
    else if (this.state==='jatk')  info={dmg:def.jatkDmg, stun:def.hitStunGiven,push:def.pushback,type:'jatk'};
    else if (this.state==='jkick') info={dmg:def.kickDmg, stun:def.hitStunGiven,push:def.pushback,type:'jkick'};
    if (!info) return null;
    if (this.dmgDebuff>0) info={...info,dmg:Math.floor(info.dmg*0.55)};
    return info;
  }
  takeHit(info,fromDir) {
    if (this.state==='special'||this.state==='super') return false;
    if (this.state==='down'||this.state==='downrise') return false;
    if (this.invincFrames>0) return false;
    if (this.hitStun>0||this.state==='dead') return false;
    const type=info.type||'normal';
    const facing=this.dir!==fromDir;
    const standG=this.state==='block'&&facing;
    const crouchG=this.guardMode&&this.state==='crouch'&&facing;
    if (type!=='special') this.specialGauge=Math.min(this.maxSpecialGauge,this.specialGauge+11);
    if ((standG&&(type==='punch'||type==='jatk'))||(crouchG&&(type==='kick'))) {
      this.comboCount=0; this.blockStun=18; this.guardFlash=14;
      beep(95,'sine',0.28,0.18); beep(60,'sine',0.14,0.14);
      return true;
    }
    if ((standG||crouchG)&&type==='special') {
      this.comboCount=0;
      this.hp-=Math.max(1,Math.floor(info.dmg*0.4));
      this.blockStun=10; this.guardFlash=9;
      beep(75,'sine',0.22,0.2);
      if (this.hp<=0){this.hp=0;this.state='dead';} return true;
    }
    if (info.knockdown) {
      const nw=(this.x<80||this.x>720);
      if (!nw) this.x+=fromDir*info.push;
      else { const att=typeof fighters!=='undefined'&&(fighters[0]===this?fighters[1]:fighters[0]); if(att) att.x-=att.dir*40; }
      this.hp=Math.max(0,this.hp-info.dmg);
      this.state='down';this.st=0;
      if(this.hp>0) this.dmgDebuff=180;
      this.comboCount=0; return true;
    }
    this.comboCount++;
    let push=info.push;
    // コーナー判定ヘルパー
    const nearWall=(this.x<80||this.x>720);
    const applyPushback=(px)=>{
      if (nearWall) {
        const attacker=typeof fighters!=='undefined'&&(fighters[0]===this?fighters[1]:fighters[0]);
        if (attacker) attacker.x-=attacker.dir*40;
      } else {
        this.x+=fromDir*px;
      }
    };
    if (this.comboCount>=7) {
      // 7連続ヒットでノックダウン
      this.comboCount=0;
      this.hp-=info.dmg;
      if (this.hp<=0){this.hp=0;this.state='dead';}
      else {this.state='down';this.st=0;}
      this.hitStun=0;
      applyPushback(push);
      return true;
    }
    if (this.comboCount===5) { push=info.push*3; } // 5連続で大ノックバック(カウントは続く)
    this.hp-=info.dmg; this.hitStun=info.stun;
    this.state='hurt'; this.st=0;
    applyPushback(push);
    if (this.hp<=0){this.hp=0;this.state='dead';this.comboCount=0;}
    return true;
  }
  update(opp,inp) {
    if (this.state==='dead') return;
    this.st++;
    if (++this.atick>=(this.def.id==='icchi'||this.def.id==='soyo'?5:9)){this.atick=0;this.af^=1;}
    if (this.hitStun>0) this.hitStun--;
    if (this.blockStun>0) this.blockStun--;
    if (this.guardFlash>0) this.guardFlash--;
    if (this.invincFrames>0) this.invincFrames--;
    this.guardMode=(this.state==='block')||(this.state==='crouch'&&!!inp.block);

    if (this.state==='down') {
      if (this.st>=90) {
        if (this.hp<=0) { this.state='dead'; }
        else { this.state='downrise'; this.st=0; }
      }
      return;
    }
    if (this.state==='downrise') {
      if (this.st>=30) { this.state='idle'; this.st=0; this.invincFrames=60; }
      return;
    }

    if (this.dmgDebuff>0) this.dmgDebuff--;
    if (this.frozenFrames>0) {
      this.frozenFrames--;
      if (!this.onGround){
        this.vy+=this.def.gravity;this.y+=this.vy;
        if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;this.airVx=0;
          if(this.state==='jump'||this.state==='jatk'||this.state==='jkick'){this.state='idle';this.st=0;}}
      }
      return;
    }

    if (this.state==='super') {
      const id=this.def.id;
      if (id==='yuuri') {
        this.vy+=this.def.gravity*0.65;this.y+=this.vy;
        if (this.superPhase===0&&this.vy>=2){
          this.superPhase=1;
          this.vy=24;
          beep(350,'sawtooth',0.22,0.35);
        }
        if (this.superPhase===1){
          const dx=opp.x-this.x;
          this.airVx=(dx>=0?1:-1)*14;
        }
        this.x+=this.airVx;
        if (this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;this.airVx=0;this.state='idle';this.st=0;this.superPhase=0;}
        this.x=Math.max(40,Math.min(W-40,this.x));
      } else if (id==='soyo') {
        const SPEED=28;
        if (this.superPhase===0){
          const dx=this.superTargetX-this.x;
          this.dir=dx>0?1:-1;
          if (Math.abs(dx)<=SPEED){
            this.x=this.superTargetX;this.superPhase=1;this.atkHit=false;
            beep(700,'sawtooth',0.15,0.1);
          } else this.x+=Math.sign(dx)*SPEED;
        } else {
          const dx=this.superOriginX-this.x;
          this.dir=dx>0?1:-1;
          if (Math.abs(dx)<=SPEED){this.x=this.superOriginX;this.state='idle';this.st=0;this.superPhase=0;}
          else this.x+=Math.sign(dx)*SPEED;
        }
        this.x=Math.max(55,Math.min(W-55,this.x));
      } else if (id==='okaasan') {
        const noteFrames=[5,10,15,20,25];
        if (noteFrames.includes(this.st)) spawnNoteProj(this,opp);
        if (this.st===35) spawnHogeProj(this,opp);
        if (this.st>=52){this.state='idle';this.st=0;}
      } else if (id==='kuppa') {
        // ハンマー乱打: 20発
        if (this.st>0&&this.st<=60&&this.st%3===0) spawnHammer(this,opp);
        if (this.st>=68){this.state='idle';this.st=0;}
      } else if (id==='kinopio') {
        // 巨大キノコ5本
        if (this.st>0&&this.st<=60&&this.st%12===0) spawnMushroom(this,true);
        if (this.st>=70){this.state='idle';this.st=0;}
      } else if (id==='mario') {
        // 超ファイヤー5発(3倍サイズ)
        if (this.st>0&&this.st<=60&&this.st%12===0) spawnFireball(this,true);
        if (this.st>=72){this.state='idle';this.st=0;}
      } else if (id==='luigi') {
        // 超高速突進: フェーズ0=溜め、フェーズ1=ダッシュ
        if (this.superPhase===0) {
          if (this.st>=14){this.superPhase=1;beep(600,'sawtooth',0.18,0.28);}
        } else {
          this.x+=this.dir*28;
          this.x=Math.max(40,Math.min(W-40,this.x));
          if (this.x<=41||this.x>=W-41||this.st>=60){this.state='idle';this.st=0;this.superPhase=0;}
        }
      } else if (id==='pikachu') {
        // スーパーでんき: 3発大電気
        if (this.st>0&&this.st<=42&&this.st%14===0) spawnThunderbolt(this,true);
        if (this.st>=56){this.state='idle';this.st=0;}
      } else if (id==='kirby') {
        // ハンマーたたき: 2段ハンマー
        if (this.superPhase===0&&this.st>=12){this.superPhase=1;beep(280,'square',0.22,0.28);}
        if (this.superPhase===1&&this.st>=30){this.superPhase=2;beep(200,'square',0.15,0.2);}
        if (this.superPhase===2&&this.st>=44){this.superPhase=3;beep(180,'square',0.28,0.38);}
        if (this.superPhase===3&&this.st>=62){this.state='idle';this.st=0;this.superPhase=0;}
      } else {
        // icchi, otousan: エンティティ召喚
        if (!this.superFired&&this.st===1){
          this.superFired=true;
          if (id==='icchi') activeDragon=new IceDragon(this,opp);
          else if (id==='otousan') activeBlackHole=new BlackHole(this,opp);
        }
        if (this.st>=(id==='icchi'?22:18)){this.state='idle';this.st=0;}
      }
      if (this.hitStun===0) this.dir=opp.x>this.x?1:-1;
      return;
    }

    if (this.state==='special') {
      const id=this.def.id;
      if (id==='yuuri') {
        this.x+=this.specialVx; this.vy+=this.def.gravity*0.65; this.y+=this.vy;
        if (this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;this.state='idle';this.st=0;}
        this.x=Math.max(40,Math.min(W-40,this.x));
        if (this.x<=41||this.x>=W-41){this.state='idle';this.st=0;}
      } else if (id==='kuppa') {
        // のしかかり
        if (this.superPhase===0) {
          this.vy+=this.def.gravity; this.y+=this.vy;
          const dx=opp.x-this.x;
          if (Math.abs(dx)>8) this.x+=Math.sign(dx)*10;
          this.x=Math.max(40,Math.min(W-40,this.x));
          if (this.y>=GROUND) {
            this.y=GROUND; this.vy=0; this.onGround=true;
            if (Math.abs(this.x-opp.x)<80) {
              this.superPhase=1; this.superHitActive=0;
              beep(100,'sawtooth',0.35,0.5); spawnHit(opp.x,opp.y-50,true);
            } else {this.state='idle';this.st=0;this.superPhase=0;}
          }
        } else {
          this.x=Math.max(40,Math.min(W-40,opp.x));
          this.y=GROUND; this.onGround=true;
          this.superHitActive++;
          if (this.superHitActive%35===0) {
            if (opp.takeHit({dmg:6,stun:8,push:0,type:'special'},(this.x<=opp.x)?1:-1)) {
              spawnHit(opp.x,opp.y-50);
              beep(150,'square',0.12,0.2);
            }
          }
          if (opp.y<GROUND-5||this.superHitActive>=180) {this.state='idle';this.st=0;this.superPhase=0;}
        }
      } else if (id==='kinopio') {
        // キノコ飛ばし 8本
        if (this.st>0&&this.st<=60&&this.st%8===0) spawnMushroom(this);
        if (this.st>=68){this.state='idle';this.st=0;}
      } else if (id==='mario') {
        // ファイヤーボール 5発
        if (this.st%10===1&&this.st<=50) spawnFireball(this);
        if (this.st>=60){this.state='idle';this.st=0;}
      } else if (id==='luigi') {
        // 突進: フェーズ0=溜め、フェーズ1=ダッシュ
        if (this.superPhase===0) {
          if (this.st>=12){this.superPhase=1;beep(440,'sawtooth',0.12,0.2);}
        } else {
          this.x+=this.dir*16;
          this.x=Math.max(40,Math.min(W-40,this.x));
          if (this.x<=41||this.x>=W-41||this.st>=50){this.state='idle';this.st=0;this.superPhase=0;}
        }
      } else if (id==='pikachu') {
        // でんき5連射
        if (this.st>0&&this.st<=40&&this.st%8===0) spawnThunderbolt(this);
        if (this.st>=52){this.state='idle';this.st=0;}
      } else if (id==='kirby') {
        // すいこみ: 相手を引き寄せ、近ければダメージ
        const sucdist=Math.abs(opp.x-this.x);
        if (this.st<55&&sucdist<210&&!opp.hitStun&&!opp.frozenFrames&&opp.state!=='special'&&opp.state!=='super') {
          opp.x+=(this.x-opp.x)*0.055;
        }
        if (this.st===52) {
          const d2=Math.abs(opp.x-this.x);
          if (d2<95) {
            if (opp.takeHit({dmg:14,stun:28,push:0,type:'special'},opp.x>=this.x?1:-1)) spawnHit(opp.x,opp.y-60);
          }
        }
        if (this.st>=68){this.state='idle';this.st=0;}
      } else {
        const fireFrame={'icchi':9,'soyo':8,'otousan':15,'okaasan':10}[id]??9;
        const endFrame={'icchi':26,'soyo':28,'otousan':60,'okaasan':30}[id]??26;
        if (id==='otousan') {
          // 3連続ことば: fireFrame, fireFrame+15, fireFrame+30
          if ((this.st===fireFrame||this.st===fireFrame+15||this.st===fireFrame+30)&&!this.specialFired) {
            this.specialFired=true;
          }
        } else {
          if (this.st===fireFrame&&!this.specialFired){this.specialFired=true;}
        }
        if (this.st>=endFrame){this.state='idle';this.st=0;}
      }
      if (this.hitStun===0) this.dir=opp.x>this.x?1:-1;
      return;
    }

    if (!this.onGround) {
      this.vy+=this.def.gravity; this.y+=this.vy;
      // 空中横移動: キー入力で上書き、なければジャンプ時の初速を維持
      if (inp.left) this.airVx=-this.def.walkSpd*0.9;
      else if (inp.right) this.airVx=this.def.walkSpd*0.9;
      this.x+=this.airVx;
      if (this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;this.airVx=0;
        if (this.state==='jump'||this.state==='jatk'||this.state==='jkick'){this.state='idle';this.st=0;}}
    }
    const atk=['punch','kick','jatk','jkick'].includes(this.state);
    if (this.hitStun===0&&!atk) this.dir=opp.x>this.x?1:-1;
    if (this.hitStun>0) return;

    if (atk) {
      const def=this.def;
      const dur=this.state==='punch'?def.punchDur:(this.state==='kick'||this.state==='jkick')?def.kickDur:def.jatkDur;
      if (this.state==='punch'&&def.punchIsProjectile&&this.st===def.punchS&&!this.punchFired) this.punchFired=true;
      if (this.st>=dur){this.state=this.onGround?'idle':'jump';this.st=0;this.atkHit=false;}
      return;
    }
    if (this.state==='hurt'&&this.st>=this.def.hitStunGiven){this.state='idle';this.st=0;}

    const ok=this.blockStun===0;

    if (ok&&inp.special&&this.specialGauge>=Math.floor(this.maxSpecialGauge/2)&&this.onGround) {
      if (this.specialGauge>=this.maxSpecialGauge) {
        // 超必殺技
        this.state='super';this.st=0;this.superFired=false;this.atkHit=false;this.specialGauge=0;
        if (this.def.id==='yuuri'){this.vy=-26;this.onGround=false;this.superPhase=0;this.airVx=0;}
        else if (this.def.id==='soyo'){this.superPhase=0;this.superTargetX=this.dir>0?W-55:55;this.superOriginX=this.dir>0?55:W-55;this.superHitActive=0;this.atkHit=false;}
        else if (this.def.id==='kuppa'){this.superPhase=0;this.superHitActive=0;}
        else if (this.def.id==='luigi'||this.def.id==='kirby'){this.superPhase=0;}
        triggerSuperFlash(this.def, this.x, this.y);
      } else {
        // 通常必殺技（ゲージ1/2消費）
        this.state='special';this.st=0;this.specialFired=false;this.punchFired=false;
        this.specialGauge=Math.max(0,this.specialGauge-Math.floor(this.maxSpecialGauge/2));
        if (this.def.id==='yuuri'){this.specialVx=this.dir*14;this.vy=-8;this.onGround=false;}
        else if (this.def.id==='kuppa'){this.superPhase=0;this.vy=-20;this.onGround=false;}
        else if (this.def.id==='luigi'){this.superPhase=0;}
        triggerSpecialFlash(this.def);
      }
      return;
    }

    if (ok&&inp.block&&!inp.down&&this.onGround){this.state='block';beep(160,'triangle',0.06,0.1);}
    else if (ok&&inp.punch&&this.onGround){this.state='punch';this.st=0;this.atkHit=false;this.punchFired=false;beep(500,'sawtooth',0.07,0.09);}
    else if (ok&&inp.kick&&this.onGround){this.state='kick';this.st=0;this.atkHit=false;beep(120,'square',0.12,0.15);}
    else if (ok&&inp.punch&&!this.onGround){this.state='jatk';this.st=0;this.atkHit=false;beep(400,'triangle',0.06,0.09);}
    else if (ok&&inp.kick&&!this.onGround&&this.state!=='jkick'){this.state='jkick';this.st=0;this.atkHit=false;beep(120,'square',0.1,0.13);}
    else if (ok&&inp.up&&this.onGround){
      this.vy=this.def.jumpVel;this.onGround=false;this.state='jump';this.st=0;
      this.airVx=inp.right?this.def.walkSpd*1.4:inp.left?-this.def.walkSpd*1.4:0;
      beep(440,'sine',0.1,0.12);
    }
    else if (inp.down&&this.onGround){this.state='crouch';}
    else if (inp.left&&this.onGround){this.x-=this.def.walkSpd;this.state='walk';this.comboCount=0;}
    else if (inp.right&&this.onGround){this.x+=this.def.walkSpd;this.state='walk';this.comboCount=0;}
    else if (this.onGround&&this.state!=='block'){this.state='idle';this.comboCount=0;}

    this.x=Math.max(55,Math.min(W-55,this.x));
    const MIN_DIST=54;
    if (Math.abs(this.x-opp.x)<MIN_DIST) {
      this.x = opp.x + (this.x>=opp.x ? MIN_DIST : -MIN_DIST);
    }
  }

  draw() {
    // ダウン状態: 横に倒れる
    if (this.state==='down'||this.state==='downrise') {
      const blink=this.state==='downrise'&&Math.floor(this.st/4)%2===0;
      if (!blink) {
        ctx.save(); ctx.translate(this.x,this.y-10);
        ctx.rotate(this.dir*Math.PI/2);
        ctx.scale(this.def.scale,this.def.scale);
        this._shape(); ctx.restore();
      }
      ctx.fillStyle=this.def.c1; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(this.def.name,this.x,this.y-30); return;
    }
    // --- 超必殺ビジュアル ---
    if (this.state==='super'&&this.def.id==='yuuri') {
      const s=this.def.scale;
      if (this.superPhase===0) {
        const pulse=0.55+0.35*Math.sin(Date.now()/60);
        ctx.save(); ctx.globalAlpha=pulse*0.6; ctx.fillStyle='#ffaa00';
        ctx.shadowBlur=40; ctx.shadowColor='#ffdd00';
        ctx.beginPath(); ctx.arc(this.x,this.y-70*s,55*s,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      }
      ctx.save(); ctx.translate(this.x,this.y-35*s);
      if (this.dir===-1) ctx.scale(-1,1); ctx.rotate(-0.42);
      ctx.scale(s,s);
      ctx.strokeStyle=this.superPhase===0?'rgba(255,200,0,0.7)':'rgba(255,160,0,0.85)'; ctx.lineWidth=4;
      for(let i=0;i<8;i++){const ly=-18+i*10;ctx.globalAlpha=(8-i)/8*0.8;
        ctx.beginPath();ctx.moveTo(-100-i*12,ly);ctx.lineTo(-58,ly);ctx.stroke();}
      ctx.globalAlpha=1;
      this._shapeDropkick(); ctx.restore();
      ctx.fillStyle='#ffdd00'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText(this.superPhase===0?'↑PHOENIX':this.def.name,this.x,this.y-(158*s)); return;
    }
    if (this.state==='super'&&this.def.id==='soyo') {
      const s=this.def.scale;
      ctx.save();
      // スピードライン（走る方向の逆に尾を引く）
      ctx.globalAlpha=0.6; ctx.strokeStyle='#44ff88'; ctx.lineWidth=3;
      ctx.shadowBlur=10; ctx.shadowColor='#00ff88';
      for(let i=0;i<7;i++){
        const trailX=this.x-this.dir*(30+i*18);
        const dy=-20-i*16;
        ctx.globalAlpha=0.55-i*0.07;
        ctx.beginPath();ctx.moveTo(trailX,this.y+dy);ctx.lineTo(this.x-this.dir*8,this.y+dy);ctx.stroke();
      }
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
      ctx.save(); ctx.translate(this.x,this.y);
      if(this.dir===-1) ctx.scale(-1,1); ctx.scale(s,s);
      this._shape(); ctx.restore(); return;
    }
    if (this.state==='super'&&this.def.id==='icchi') {
      const s=this.def.scale, pulse=0.45+0.35*Math.sin(Date.now()/90);
      ctx.save(); ctx.globalAlpha=pulse*0.55; ctx.fillStyle='#00ccff';
      ctx.shadowBlur=45; ctx.shadowColor='#0088ff';
      ctx.beginPath(); ctx.arc(this.x,this.y-70*s,65*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='otousan') {
      const r=18+14*Math.sin(Date.now()/75);
      ctx.save(); ctx.globalAlpha=0.6; ctx.fillStyle='#330044';
      ctx.shadowBlur=30; ctx.shadowColor='#8800cc';
      ctx.beginPath(); ctx.arc(this.x,this.y-60*this.def.scale,r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='okaasan') {
      const s=this.def.scale, pulse=0.4+0.3*Math.sin(Date.now()/80);
      ctx.save(); ctx.globalAlpha=pulse*0.5; ctx.fillStyle='#ff44cc';
      ctx.beginPath(); ctx.arc(this.x,this.y-70*s,50*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='kuppa') {
      const s=this.def.scale, pulse=0.5+0.4*Math.sin(Date.now()/70);
      ctx.save(); ctx.globalAlpha=pulse*0.45; ctx.fillStyle='#ff4400';
      ctx.shadowBlur=36; ctx.shadowColor='#ff8800';
      ctx.beginPath(); ctx.arc(this.x,this.y-65*s,58*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='mario') {
      // マリオが巨大化
      const s=this.def.scale;
      ctx.save(); ctx.translate(this.x,this.y);
      if (this.dir===-1) ctx.scale(-1,1); ctx.scale(s*2.0,s*2.0);
      this._shape(); ctx.restore();
      ctx.fillStyle='#ffee00'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
      ctx.fillText('★超ファイヤー★',this.x,this.y-(220*s)); return;
    }
    if (this.state==='super'&&this.def.id==='kinopio') {
      const s=this.def.scale, pulse=0.4+0.35*Math.sin(Date.now()/85);
      ctx.save(); ctx.globalAlpha=pulse*0.5; ctx.fillStyle=this.def.c1;
      ctx.beginPath(); ctx.arc(this.x,this.y-55*s,44*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='luigi') {
      const s=this.def.scale;
      if (this.superPhase===0) {
        const pulse=0.5+0.4*Math.sin(Date.now()/80);
        ctx.save(); ctx.globalAlpha=pulse*0.55; ctx.fillStyle='#00ff55';
        ctx.shadowBlur=40; ctx.shadowColor='#00ff55';
        ctx.beginPath(); ctx.arc(this.x,this.y-65*s,60*s,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      } else {
        ctx.save(); ctx.strokeStyle='#00ff55'; ctx.lineWidth=4; ctx.shadowBlur=8; ctx.shadowColor='#00ff55';
        for (let i=0;i<8;i++){
          const tx=this.x-this.dir*(14+i*18);
          const dy=-18-i*14;
          ctx.globalAlpha=0.58-i*0.07;
          ctx.beginPath();ctx.moveTo(tx,this.y+dy);ctx.lineTo(this.x-this.dir*4,this.y+dy);ctx.stroke();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
      }
    }
    if (this.state==='super'&&this.def.id==='pikachu') {
      const s=this.def.scale, pulse=0.45+0.4*Math.sin(Date.now()/75);
      ctx.save(); ctx.globalAlpha=pulse*0.55; ctx.fillStyle='#ffee00';
      ctx.shadowBlur=48; ctx.shadowColor='#ffff00';
      ctx.beginPath(); ctx.arc(this.x,this.y-60*s,66*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=pulse*0.3; ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(this.x,this.y-60*s,38*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }
    if (this.state==='super'&&this.def.id==='kirby') {
      const s=this.def.scale;
      const isSwing=this.superPhase===1||this.superPhase===3;
      if (isSwing) {
        ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle=this.superPhase===3?'#ff4400':'#ff8800';
        ctx.shadowBlur=24; ctx.shadowColor=this.superPhase===3?'#ff4400':'#ff8800';
        ctx.beginPath(); ctx.arc(this.x+this.dir*45*s,this.y-55*s,32*s,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      }
    }
    // --- 通常必殺技ビジュアル (yuuri) ---
    if (this.state==='special'&&this.def.id==='yuuri') {
      ctx.save(); ctx.translate(this.x,this.y-35);
      if (this.dir===-1) ctx.scale(-1,1); ctx.rotate(-0.42);
      ctx.scale(this.def.scale,this.def.scale);
      ctx.strokeStyle='rgba(220,80,0,0.55)'; ctx.lineWidth=3;
      for (let i=0;i<6;i++){const ly=-18+i*10;ctx.beginPath();ctx.moveTo(-100-i*8,ly);ctx.lineTo(-60,ly);ctx.stroke();}
      this._shapeDropkick(); ctx.restore();
      ctx.fillStyle=this.def.c1; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(this.def.name,this.x,this.y-145); return;
    }
    if (this.state==='special'&&this.def.id==='icchi') {
      const aura=Math.min(1,this.st/10);
      ctx.save(); ctx.globalAlpha=aura*0.35; ctx.fillStyle='#00ccff';
      ctx.beginPath(); ctx.arc(this.x,this.y-70,45*aura,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
    if (this.state==='special'&&this.def.id==='soyo') {
      const aura=Math.min(1,this.st/8);
      ctx.save(); ctx.globalAlpha=aura*0.3; ctx.fillStyle='#22cc44';
      ctx.beginPath(); ctx.arc(this.x,this.y-50,40*aura,0,Math.PI*2); ctx.fill();

    if (this.state==='special'&&this.def.id==='kuppa'&&this.superPhase===1) {
      // のしかかり中: 重圧エフェクト

      ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(Date.now()/60); ctx.fillStyle='#884400';
      ctx.shadowBlur=22; ctx.shadowColor='#ff6600';
      ctx.beginPath(); ctx.arc(this.x,this.y-55*s,48*s,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      ctx.fillStyle='#ffcc00'; ctx.font=`bold ${Math.round(11*s)}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('のしかかり中!',this.x,this.y-(145*s));
    }
    if (this.state==='special'&&(this.def.id==='kinopio'||this.def.id==='mario')) {
      const aura=Math.min(1,this.st/8);
      ctx.save(); ctx.globalAlpha=aura*0.3; ctx.fillStyle=this.def.c1;
      ctx.beginPath(); ctx.arc(this.x,this.y-55,38*aura,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
    if (this.state==='special'&&this.def.id==='luigi') {
      const s=this.def.scale;
      if (this.superPhase===0) {

        ctx.shadowBlur=20; ctx.shadowColor='#22ff44';
        ctx.beginPath(); ctx.arc(this.x,this.y-60*s,50*s*aura,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      } else {
        ctx.save(); ctx.strokeStyle='#22ff44'; ctx.lineWidth=3;
        for (let i=0;i<5;i++){

        }
        ctx.globalAlpha=1; ctx.restore();

    }
    if (this.state==='special'&&this.def.id==='pikachu') {
      const aura=Math.min(1,this.st/8);
      ctx.save(); ctx.globalAlpha=aura*0.35; ctx.fillStyle='#ffee00';
      ctx.shadowBlur=18; ctx.shadowColor='#ffee00';
      ctx.beginPath(); ctx.arc(this.x,this.y-55*this.def.scale,42*this.def.scale*aura,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }
    if (this.state==='special'&&this.def.id==='kirby') {
      const s=this.def.scale, prog=Math.min(1,this.st/55);
      const vx2=this.x+this.dir*55*s, vy2=this.y-55*s;
      ctx.save();
      for (let i=0;i<3;i++){
        const ang=Date.now()/150+i*Math.PI*2/3;
        ctx.globalAlpha=prog*0.4; ctx.strokeStyle='#ff88cc'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(vx2,vy2,(18+i*11)*s*prog,ang,ang+Math.PI*1.5); ctx.stroke();
      }
      ctx.globalAlpha=prog*0.18; ctx.fillStyle='#ff88cc';
      ctx.beginPath(); ctx.arc(vx2,vy2,24*s*prog,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
    // Freeze effect
    if (this.frozenFrames>0) {
      const sc=this.def.scale, alpha=0.55+0.3*Math.sin(Date.now()/55);
      ctx.save(); ctx.globalAlpha=alpha*0.55; ctx.fillStyle='#aaeeff';
      ctx.shadowBlur=20; ctx.shadowColor='#00ccff';
      ctx.beginPath(); ctx.arc(this.x,this.y-65*sc,50*sc,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      ctx.fillStyle='#00ccff'; ctx.font=`bold ${Math.round(11*sc)}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('❄FREEZE❄',this.x,this.y-(138*sc));
    }
    if (this.dmgDebuff>0) {
      ctx.fillStyle='#ff8800'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('⚡弱体',this.x,this.y-(150*this.def.scale));
    }
    // Special gauge ready glow (2-level)
    const _minG=Math.floor(this.maxSpecialGauge/2);
    if (this.specialGauge>=_minG) {
      const sc=this.def.scale, cy=this.y-65*sc, t2=Date.now();
      if (this.specialGauge>=this.maxSpecialGauge) {
        // 超必殺 ready: dramatic aura + dual rings + 8 particles + label
        const pulse=0.5+0.5*Math.sin(t2/90), pulse2=0.5+0.5*Math.sin(t2/55+1.5);
        ctx.save();
        ctx.globalAlpha=pulse*0.52; ctx.fillStyle=this.def.c1;
        ctx.shadowBlur=52; ctx.shadowColor=this.def.c1;
        ctx.beginPath(); ctx.arc(this.x,cy,74*sc,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=pulse2*0.28; ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff';
        ctx.beginPath(); ctx.arc(this.x,cy,42*sc,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
        const ra=t2/600;
        ctx.strokeStyle=this.def.c1; ctx.lineWidth=3; ctx.globalAlpha=0.65+0.35*pulse;
        ctx.beginPath();
        for (let i=0;i<12;i++){const a1=ra+i/12*Math.PI*2,a2=ra+(i+0.65)/12*Math.PI*2,r=64*sc;ctx.moveTo(this.x+Math.cos(a1)*r,cy+Math.sin(a1)*r*0.62);ctx.lineTo(this.x+Math.cos(a2)*r,cy+Math.sin(a2)*r*0.62);}
        ctx.stroke();
        const ra2=-t2/380;
        ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.globalAlpha=0.5+0.5*pulse2;
        ctx.beginPath();
        for (let i=0;i<8;i++){const a1=ra2+i/8*Math.PI*2,a2=ra2+(i+0.55)/8*Math.PI*2,r=46*sc;ctx.moveTo(this.x+Math.cos(a1)*r,cy+Math.sin(a1)*r*0.58);ctx.lineTo(this.x+Math.cos(a2)*r,cy+Math.sin(a2)*r*0.58);}
        ctx.stroke();
        for (let i=0;i<8;i++){
          const ang=(t2/360+i/8)*Math.PI*2, r=60*sc;
          ctx.globalAlpha=0.9*(0.5+0.5*Math.sin(t2/75+i*0.8));
          ctx.fillStyle=(i%2===0)?this.def.c1:'#ffffff';
          ctx.beginPath(); ctx.arc(this.x+Math.cos(ang)*r,cy+Math.sin(ang)*r*0.6,5,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha=1;
        const lblA=0.72+0.28*Math.sin(t2/110);
        ctx.globalAlpha=lblA; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
        ctx.strokeStyle='#000'; ctx.lineWidth=3;
        ctx.strokeText('超必殺 READY!',this.x,cy-80*sc);
        ctx.fillStyle='#ffffff'; ctx.fillText('超必殺 READY!',this.x,cy-80*sc);
        ctx.globalAlpha=1;
      } else {
        // 通常必殺 ready: soft pulsing aura only
        const pulse=0.28+0.28*Math.sin(t2/210);
        ctx.save();
        ctx.globalAlpha=pulse; ctx.fillStyle=this.def.c1;
        ctx.shadowBlur=20; ctx.shadowColor=this.def.c1;
        ctx.beginPath(); ctx.arc(this.x,cy,40*sc,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
        ctx.globalAlpha=1;
      }
    }

    // ガードエフェクト (立ち=縦弧、しゃがみ=横型低バリア)
    if (this.guardFlash>0) {
      const gf=this.guardFlash/14;
      const isCG=this.state==='crouch';
      const sc=this.def.scale;
      const gx=this.x+this.dir*34*sc;
      const gy=this.y-(isCG?20:52)*sc;
      const r=(isCG?24:18)*sc;
      ctx.save(); ctx.lineCap='round';
      ctx.shadowBlur=16; ctx.shadowColor='#2244ff';
      ctx.strokeStyle='#4477ff'; ctx.lineWidth=3.5*sc;
      ctx.globalAlpha=gf*0.88;
      if (isCG) {
        ctx.beginPath(); ctx.arc(gx,gy,r,-Math.PI*0.85,Math.PI*0.85); ctx.stroke();
        ctx.lineWidth=2*sc;
        ctx.beginPath(); ctx.arc(gx,gy,r*0.45,-Math.PI*0.7,Math.PI*0.7); ctx.stroke();
        ctx.shadowBlur=0;
        ctx.globalAlpha=gf*0.2; ctx.fillStyle='#7799ff';
        ctx.beginPath(); ctx.arc(gx,gy,r,-Math.PI*0.85,Math.PI*0.85); ctx.closePath(); ctx.fill();
        ctx.globalAlpha=gf*0.9; ctx.fillStyle='#aaccff';
        ctx.font=`bold ${Math.round(10*sc)}px sans-serif`; ctx.textAlign='center';
        ctx.fillText('しゃがみガード',gx,gy+r+13*sc);
      } else {
        ctx.beginPath(); ctx.arc(gx,gy,r,-Math.PI*0.72,Math.PI*0.72); ctx.stroke();
        ctx.lineWidth=2*sc;
        ctx.beginPath(); ctx.arc(gx,gy,r*0.52,-Math.PI*0.55,Math.PI*0.55); ctx.stroke();
        ctx.shadowBlur=0;
        ctx.globalAlpha=gf*0.22; ctx.fillStyle='#7799ff';
        ctx.beginPath(); ctx.arc(gx,gy,r,-Math.PI*0.72,Math.PI*0.72); ctx.closePath(); ctx.fill();
        ctx.globalAlpha=gf*0.85; ctx.fillStyle='#99bbff';
        ctx.font=`bold ${Math.round(11*sc)}px sans-serif`; ctx.textAlign='center';
        ctx.fillText('カン',gx,gy-r-5*sc);
      }
      ctx.globalAlpha=1; ctx.restore();
    }
    const flash=this.hitStun>0&&Math.floor(this.hitStun/3)%2===0;
    if (flash) return;
    ctx.save(); ctx.translate(this.x,this.y);
    if (this.dir===-1) ctx.scale(-1,1);
    ctx.scale(this.def.scale,this.def.scale);
    this._shape(); ctx.restore();
    // Kirby super: draw hammer on top of character
    if (this.state==='super'&&this.def.id==='kirby') {
      const s=this.def.scale;
      const ang=this.superPhase===1||this.superPhase===3 ? Math.PI*0.15 : -Math.PI*0.55;
      ctx.save(); ctx.translate(this.x+this.dir*18*s,this.y-88*s);
      ctx.rotate(this.dir*ang);
      ctx.scale(s,s);
      ctx.fillStyle='#886633'; ctx.fillRect(-4,0,8,38); // handle
      ctx.fillStyle=this.superPhase>=2?'#cc2200':'#cc7700'; ctx.fillRect(-18,-22,36,24); // head
      ctx.fillStyle='rgba(255,200,80,0.5)'; ctx.fillRect(-16,-20,34,20); // shine
      ctx.restore();
    }
    ctx.fillStyle=this.def.c1; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(this.def.name,this.x,this.y-130*this.def.scale-5);
  }

  _shape() {
    const s=this.state,def=this.def,c1=def.c1,c2=def.c2;
    const bw=def.bodyW,lw=def.limbW;
    const crouching=s==='crouch';
    const swing=s==='walk'?Math.sin(this.af*Math.PI)*14:0;
    const punchOn=s==='punch'&&this.st>=def.punchS&&this.st<=def.punchE&&!def.punchIsProjectile;
    const jatkOn=s==='jatk'&&this.st>=def.jatkS&&this.st<=def.jatkE;
    const kickOn=(s==='kick'&&this.st>=def.kickS&&this.st<=def.kickE)||
                 (s==='jkick'&&this.st>=def.kickS&&this.st<=def.kickE);
    const isSpecial=s==='special';
    const chargeRaise=isSpecial?Math.min(1,this.st/10):0;
    const bodyTop=crouching?-50:-84;
    const bodyH  =crouching?28:48;
    const beltY  =crouching?-30:-44;
    const aY     =bodyTop+10;
    const headCY =crouching?-68:-106;
    const footY  =crouching?-8:-18;

    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(0,2,26,7,0,0,Math.PI*2); ctx.fill();

    ctx.lineWidth=lw; ctx.lineCap='round'; ctx.strokeStyle=c2;
    if (kickOn) {
      // キック3段階モーション
      const kickPhase = this.st - def.kickS;
      const kickRange = def.kickE - def.kickS;
      if (kickPhase < kickRange * 0.36) {
        // 前半: ひざを上げる
        const t = kickPhase / (kickRange * 0.36);
        const kneeRaise = t * 28;
        // 軸足: 少し屈む
        ctx.beginPath(); ctx.moveTo(0,footY+6); ctx.lineTo(-10,-36+4); ctx.stroke();
        // 蹴り足: ひざ高く
        ctx.beginPath(); ctx.moveTo(0,footY+6); ctx.lineTo(16,-26-kneeRaise); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(16,-26-kneeRaise); ctx.lineTo(24,-16-kneeRaise+10); ctx.stroke();
      } else if (kickPhase < kickRange * 0.72) {
        // 中盤: 蹴り出し
        const t = (kickPhase - kickRange*0.36) / (kickRange * 0.36);
        const ext = t;
        ctx.beginPath(); ctx.moveTo(0,footY+4); ctx.lineTo(-8,-36+3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,footY+4); ctx.lineTo(20+ext*22,-26+ext*14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(20+ext*22,-26+ext*14); ctx.lineTo(42+ext*14,-10+ext*2); ctx.stroke();
        // つま先（小さな線）
        ctx.lineWidth=lw*0.7;
        ctx.beginPath(); ctx.moveTo(42+ext*14,-10+ext*2); ctx.lineTo(50+ext*14,-8+ext*2); ctx.stroke();
        ctx.lineWidth=lw;
      } else {
        // 後半: 足が戻る
        const t = (kickPhase - kickRange*0.72) / (kickRange * 0.28);
        const ret = t;
        ctx.beginPath(); ctx.moveTo(0,footY+2); ctx.lineTo(-9,-36+2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,footY+2); ctx.lineTo(30-ret*20,-14+ret*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(30-ret*20,-14+ret*2); ctx.lineTo(46-ret*28,-8+ret*2); ctx.stroke();
      }
    } else if (crouching) {
      // しゃがみ: 両ひざを外に開く安定姿勢
      ctx.beginPath(); ctx.moveTo(-4,bodyTop+bodyH); ctx.lineTo(-26,-4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4,bodyTop+bodyH); ctx.lineTo(26,-4); ctx.stroke();
    } else if (s==='jump'||s==='jatk'||s==='jkick') {
      // ジャンプ: 上昇/下降で足の形を変える
      if (this.vy < 0) {
        // 上昇中: ひざを引き上げる（足を畳む）
        ctx.beginPath(); ctx.moveTo(-4,footY); ctx.lineTo(-14,-28); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-14,-28); ctx.lineTo(-10,-16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(4,footY); ctx.lineTo(14,-28); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(14,-28); ctx.lineTo(10,-16); ctx.stroke();
      } else {
        // 下降中: 足を伸ばして着地準備
        ctx.beginPath(); ctx.moveTo(0,footY); ctx.lineTo(-12,-36); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,footY); ctx.lineTo(12,-36); ctx.stroke();
      }
    } else {
      const ls=Math.abs(swing)*0.6;
      ctx.beginPath(); ctx.moveTo(0,footY); ctx.lineTo(-10-ls,-42); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,footY); ctx.lineTo(10+ls,-42); ctx.stroke();
    }

    ctx.fillStyle=c1; ctx.fillRect(-bw/2,bodyTop,bw,bodyH);
    ctx.fillStyle=c2; ctx.fillRect(-bw/2,beltY,bw,8);
    if (def.id==='otousan') {
      ctx.fillStyle=c1; ctx.fillRect(-bw/2,bodyTop,bw,bodyH);
      ctx.fillStyle='#ffffff'; ctx.fillRect(-4,bodyTop+2,8,bodyH-10);
      ctx.fillStyle=c2; ctx.fillRect(-bw/2,beltY,bw,8);
      ctx.fillStyle='#cc2211';
      ctx.beginPath(); ctx.moveTo(-3,bodyTop+4); ctx.lineTo(3,bodyTop+4);
      ctx.lineTo(5,bodyTop+27); ctx.lineTo(8,beltY);
      ctx.lineTo(0,beltY+8); ctx.lineTo(-8,beltY); ctx.lineTo(-5,bodyTop+27);
      ctx.closePath(); ctx.fill();
    }
    if (def.id==='yuuri') {
      ctx.fillStyle='rgba(180,180,180,0.25)';
      ctx.fillRect(-bw/2,bodyTop,bw/2,bodyH);
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(-bw/2+2,bodyTop+2,5,bodyH-4); ctx.fillRect(bw/2-7,bodyTop+2,5,bodyH-4);
      ctx.fillStyle='rgba(100,100,100,0.5)'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
      ctx.fillText('ゆ',0,beltY-8);
    }
    if (def.id==='kuppa') {
      // Shell spikes on back
      ctx.fillStyle='#ffeeaa';
      for (let i=0;i<4;i++){const sx=-bw/2+(i+0.5)*bw/4,sy=bodyTop+i*12; ctx.beginPath();ctx.moveTo(sx-5,sy+8);ctx.lineTo(sx,sy-4);ctx.lineTo(sx+5,sy+8);ctx.closePath();ctx.fill();}
    }
    if (def.id==='mario') {
      // Blue overalls straps
      ctx.fillStyle=c2;
      ctx.fillRect(-bw/2,bodyTop,bw,bodyH);
      ctx.fillStyle=c1; ctx.fillRect(-bw/2,bodyTop,bw,bodyH*0.38);
      ctx.fillRect(-bw/2,beltY,bw,bodyH-bodyH*0.38-8);
      ctx.fillStyle=c2; ctx.fillRect(-bw/2,beltY,bw,8);
      ctx.fillRect(-6,bodyTop-4,12,bodyH*0.38+4);
    }
    if (def.id==='kinopio') {
      // White vest
      ctx.fillStyle='#ffffff'; ctx.fillRect(-bw/2+2,bodyTop+2,bw-4,bodyH-4);
      ctx.fillStyle=c1; ctx.fillRect(-bw/2,beltY,bw,8);
      ctx.fillStyle='#cc2222'; ctx.beginPath(); ctx.arc(0,bodyTop+bodyH/2,5,0,Math.PI*2); ctx.fill();
    }
    if (def.id==='kirby') {
      // カービィ: 丸い体
      ctx.fillStyle=c1;
      ctx.beginPath(); ctx.ellipse(0,bodyTop+bodyH/2+2,bw/2+8,bodyH/2+12,0,0,Math.PI*2); ctx.fill();
    }

    ctx.lineWidth=lw; ctx.strokeStyle=c1;
    if (punchOn) {
      // パンチ2段階モーション
      const punchPhase = this.st - def.punchS;
      const punchRange = def.punchE - def.punchS;
      const punchHalf = punchRange * 0.5;
      if (punchPhase < punchHalf) {
        // 前半: 腕が勢いよく前に飛び出す（伸びきった状態）
        ctx.beginPath(); ctx.moveTo(bw/2-4,aY); ctx.lineTo(bw/2+50,aY-2); ctx.stroke();
        // ナックル（拳）を描く
        ctx.fillStyle='#FFCC99';
        ctx.beginPath(); ctx.arc(bw/2+50,aY-2,lw*1.0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#ccaa77'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(bw/2+50,aY-2,lw*1.0,0,Math.PI*2); ctx.stroke();
        ctx.lineWidth=lw; ctx.strokeStyle=c1;
        // 反対の腕（左腕）: ガードのように顔の前に構える
        ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(-bw/2+16,aY-18); ctx.stroke();
      } else {
        // 後半: 腕が少し引き戻される（フォロースルー）
        const t = (punchPhase - punchHalf) / (punchRange - punchHalf);
        const pullback = t * 10;
        ctx.beginPath(); ctx.moveTo(bw/2-4,aY); ctx.lineTo(bw/2+40-pullback,aY); ctx.stroke();
        ctx.fillStyle='#FFCC99';
        ctx.beginPath(); ctx.arc(bw/2+40-pullback,aY,lw*0.85,0,Math.PI*2); ctx.fill();
        ctx.lineWidth=lw; ctx.strokeStyle=c1;
        ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(-bw/2+16,aY-14); ctx.stroke();
      }
    } else if (def.id==='otousan'&&s==='punch') {
      const windup=Math.min(1,this.st/18);
      ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(-bw/2-20-windup*15,aY-21-windup*10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bw/2-4,aY); ctx.lineTo(bw/2+10,aY+16); ctx.stroke();
    } else if (crouching&&this.guardMode) {
      // しゃがみガード: 両腕をX字に前に構えて低ガード（前腕を太めに）
      ctx.lineWidth=lw*1.3;
      ctx.beginPath(); ctx.moveTo(bw/2-4,aY); ctx.lineTo(2,aY+20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(bw/2+8,aY+18); ctx.stroke();
      ctx.lineWidth=lw;
      ctx.fillStyle='#FFCC99';
      ctx.beginPath(); ctx.arc(2,aY+20,lw*0.7,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bw/2+8,aY+18,lw*0.7,0,Math.PI*2); ctx.fill();
    } else if (crouching) {
      // しゃがみ通常: 手を膝の前に持ってくる（ファイティングポーズ）
      ctx.beginPath(); ctx.moveTo(bw/2-4,aY); ctx.lineTo(bw/2+16,aY+16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(-4,aY+18); ctx.stroke();
      ctx.fillStyle='#FFCC99';
      ctx.beginPath(); ctx.arc(bw/2+16,aY+16,lw*0.65,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-4,aY+18,lw*0.65,0,Math.PI*2); ctx.fill();
    } else if (s==='block') {
      // ブロック: 両腕を頭・顔の前でクロスして構える（ボクシングガード）
      // 右腕: 前腕を太めに描き、顔前でクロス
      ctx.lineWidth=lw*1.4;
      ctx.beginPath(); ctx.moveTo(bw/2-4,aY-4); ctx.lineTo(bw/2-6,aY-26); ctx.stroke();

      ctx.beginPath(); ctx.moveTo(-bw/2+4,aY); ctx.lineTo(bw/2-2,aY-24); ctx.stroke();

// ---- CPU AI ----
class CPU {
  constructor(me,opp){this.me=me;this.opp=opp;this.timer=0;this.action='idle';}
  update() {
    const diff = typeof cpuDifficulty !== 'undefined' ? cpuDifficulty : 'normal';
    const dist=Math.abs(this.me.x-this.opp.x);

    // 弱い: 40%の確率で何もしない
    if (diff === 'weak' && Math.random() < 0.4) {
      return {punch:false,kick:false,left:false,right:false,up:false,down:false,block:false,special:false};
    }

    // 相手がキック攻撃中ならしゃがみガード
    if (diff !== 'weak' && dist < 120) {
      const oppKick = this.opp.state==='kick'||this.opp.state==='jkick';
      const reactProb = diff === 'strong' ? 0.65 : 0.42;
      if (oppKick && Math.random() < reactProb) {
        return {punch:false,kick:false,left:false,right:false,up:false,down:true,block:true,special:false};
      }
    }
    // 強い: 相手が攻撃中なら積極的にガード
    if (diff === 'strong') {
      const oppAtk = ['punch','kick','jatk','jkick','special'].includes(this.opp.state);
      if (oppAtk && dist < 130 && Math.random() < 0.5) {
        const isKick = this.opp.state==='kick'||this.opp.state==='jkick';
        return {punch:false,kick:false,left:false,right:false,up:false,down:isKick,block:true,special:false};
      }
    }

    if (--this.timer<=0) {
      const fast=this.me.def.walkSpd>5;
      // 弱い: 反応が遅い・距離が近い時だけ行動
      if (diff === 'weak') {
        this.timer = 25 + Math.random() * 35;
        const r = Math.random();
        if (dist < 60) this.action = r < 0.6 ? 'punch' : r < 0.8 ? 'back' : 'idle';
        else this.action = r < 0.5 ? 'fwd' : 'idle';
      } else if (diff === 'strong') {
        this.timer = fast ? 5 + Math.random() * 10 : 10 + Math.random() * 18;
        const r = Math.random();
        if (dist < 85)       this.action = r < 0.35 ? 'punch' : r < 0.55 ? 'kick' : r < 0.7 ? 'block' : 'back';
        else if (dist < 200) this.action = r < 0.55 ? 'fwd' : r < 0.75 ? 'punch' : r < 0.85 ? 'jump' : 'idle';
        else                 this.action = r < 0.7 ? 'fwd' : r < 0.85 ? 'jump' : 'idle';
      } else {
        this.timer=fast?8+Math.random()*15:18+Math.random()*28;
        const r=Math.random();
        if (dist<85)       this.action=r<0.35?'punch':r<0.6?'kick':r<0.75?'block':'back';
        else if (dist<170) this.action=r<0.5?'fwd':r<0.7?'punch':r<0.8?'jump':'idle';
        else               this.action=r<0.65?'fwd':r<0.8?'jump':'idle';
      }
    }
    const toward=this.opp.x>this.me.x;
    const inp={punch:false,kick:false,left:false,right:false,up:false,down:false,block:false,special:false};
    const acc=this.me.def.id==='icchi'||this.me.def.id==='soyo'?0.78:0.68;
    if (Math.random()<acc) {
      // 弱い: パンチのみ、キックなし
      if (diff === 'weak') {
        if (this.action==='punch') inp.punch=true;
        else if (this.action==='fwd') inp[toward?'right':'left']=true;
        else if (this.action==='back') inp[toward?'left':'right']=true;
      } else {
        if (this.action==='punch') inp.punch=true;
        else if (this.action==='kick') {
          // 強い: 50%でキック使う
          if (diff === 'strong' && Math.random() < 0.5) inp.kick=true;
          else if (diff !== 'strong') inp.kick=true;
          else inp.punch=true;
        }
        else if (this.action==='fwd') inp[toward?'right':'left']=true;
        else if (this.action==='back') inp[toward?'left':'right']=true;
        else if (this.action==='jump'){inp.up=true;inp[toward?'right':'left']=true;}
        else if (this.action==='block') {
          inp.block=true;
          if (this.opp.state==='kick'||this.opp.state==='jkick'||Math.random()<0.38) inp.down=true;
        }
      }
    }
    // 空中攻撃: 降下中で相手が近ければジャンプ攻撃
    if (diff !== 'weak' && !this.me.onGround && this.me.state==='jump' && this.me.vy>0 && dist<130) {
      Math.random()<0.55 ? (inp.punch=true) : (inp.kick=true);
    }
    // おとうさん: ブラックホール発動中は前進して相手を追い込む
    if (this.me.def.id==='otousan' && typeof activeBlackHole!=='undefined' && activeBlackHole && activeBlackHole.owner===this.me) {
      inp[toward?'right':'left'] = true;
      return inp;
    }
    const full=this.me.specialGauge>=this.me.maxSpecialGauge;
    // 弱い: 必殺技を使わない
    if (diff !== 'weak' && full&&this.me.onGround&&this.me.state==='idle') {
      const useIt=this.me.def.id==='yuuri'?dist<220:true;
      // 強い: より積極的に必殺技を使う
      const threshold = diff === 'strong' ? 0.75 : 0.6;
      if (useIt&&Math.random()<threshold) inp.special=true;
    }
    return inp;
  }
}

// ---- Collision ----
function checkCollision(a,b) {
  if (a.atkHit) return;
  const hb=a.hitbox(); if (!hb) return;
  const hurt=b.hurtbox();
  const hx=hb.w<0?hb.x+hb.w:hb.x, hw=Math.abs(hb.w);
  if (hx<hurt.x+hurt.w&&hx+hw>hurt.x&&hb.y<hurt.y+hurt.h&&hb.y+hb.h>hurt.y) {
    const info=a.damageInfo();
    if (info&&b.takeHit(info,a.dir)) {
      if (a.state!=='special'&&a.state!=='super') a.atkHit=true;
      if (a.state!=='special'&&a.state!=='super') a.specialGauge=Math.min(a.maxSpecialGauge,a.specialGauge+16);
      spawnHit((a.x+b.x)/2,b.y-72,a.state==='special'||a.state==='super');
    }
  }
}

function drawResultPose() {
  if (phase!=='roundend') return;
  [p1,p2].forEach(f => {
    if (f.pose!=='celebrate') return;
    const now=Date.now();
    ctx.save();
    for (let i=0;i<6;i++) {
      const ang=now/500+i*Math.PI/3;
      const r=48+Math.sin(now/300+i)*8;
      const sx=f.x+Math.cos(ang)*r;
      const sy=f.y-160+Math.sin(ang*1.5)*12;
      const sz=3+Math.sin(now/200+i)*1.2;
      ctx.fillStyle=i%3===0?'#ffdd00':i%3===1?'#ffffff':'#ff88cc';
      ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

function connectNet() {

  try { netWs=new WebSocket(url); } catch(e) { phase='netwait'; return; }

  netWs.onmessage=e=>{ try{handleNetMsg(JSON.parse(e.data));}catch(ex){} };
  netWs.onclose=()=>{
    if(phase==='fight'||phase==='countdown'||phase==='roundend') {
      showFlash('相手が切断しました',200);
      setTimeout(()=>exitToMenu(),3000);
    } else if(phase==='netwait'||phase==='charselect') {
      phase='netwait';
    }
    netWs=null;
  };
  netWs.onerror=()=>{};
}

function handleNetMsg(msg) {
  switch(msg.type) {
    case 'start':
      netPlayerNum=msg.player;
      netMyCharIdx=-1; netOppCharIdx=-1; netMyReady=false;
      phase='charselect'; selectStep=0; selectedCharIdx=0; cpuCharIdx=1;
      beep(440,'sine',0.12);
      break;
    case 'char':
      netOppCharIdx=msg.idx;
      if (msg.seed) netSeed=msg.seed; // player 1's seed is authoritative
      if(netMyReady) startNetFight();
      break;
    case 'input':
      netOppInput={punch:!!msg.punch,kick:!!msg.kick,left:!!msg.left,right:!!msg.right,
                   up:!!msg.up,down:!!msg.down,block:!!msg.block,special:!!msg.special};
      break;
    case 'roundend':
      // Player 1 is authoritative: sync win counts and enter roundend
      wins=msg.wins;
      if (msg.p1wins===true){
        // Player 1 won → Player 2 lost
        p1.pose='celebrate'; p2.pose='defeat';
        showFlash('相手 WIN!',130); beep(330,'sine',0.6,0.35);
      } else if (msg.p1wins===false){
        // Player 2 won → Player 2's character celebrates
        p2.pose='celebrate'; p1.pose='defeat';
        showFlash(`${p2.def.name} WIN!`,130); beep(523,'sine',0.6,0.4);
      } else { showFlash('DRAW!',130); }
      phase='roundend'; endTimer=999999; // wait for nextround message
      break;
    case 'nextround':
      // Player 1 signals it's time to start the next round
      roundNum=msg.roundNum;
      startRound(); phase='countdown';
      showFlash(`ROUND ${roundNum}`,80);
      setTimeout(()=>showFlash('FIGHT!',70),1200);
      setTimeout(()=>{phase='fight';},1800);
      break;
    case 'gameover':
      exitToMenu();
      break;
    case 'disconnect':
      showFlash('相手が切断しました',200);
      setTimeout(()=>exitToMenu(),3000);
      break;
    case 'sync':
      if (netPlayerNum===2&&p1&&p2) {
        if (Math.abs(p1.x-msg.p1x)>20) p1.x=msg.p1x;
        if (Math.abs(p1.y-msg.p1y)>20) p1.y=msg.p1y;
        if (Math.abs(p2.x-msg.p2x)>20) p2.x=msg.p2x;
        if (Math.abs(p2.y-msg.p2y)>20) p2.y=msg.p2y;
        p1.hp=msg.p1hp; p1.specialGauge=msg.p1sg;
        p2.hp=msg.p2hp; p2.specialGauge=msg.p2sg;
      }
      break;
  }
}

function startNetFight() {
  if(netPlayerNum===1){selectedCharIdx=netMyCharIdx;cpuCharIdx=netOppCharIdx;}
  else{selectedCharIdx=netOppCharIdx;cpuCharIdx=netMyCharIdx;}
  seedRng(netSeed||1); // initialize shared PRNG
  wins=[0,0];roundNum=1;startRound();phase='countdown';
  showFlash(`ROUND ${roundNum}`,80);
  setTimeout(()=>showFlash('FIGHT!',70),1200);
  setTimeout(()=>{phase='fight';},1800);
  beep(523,'sine',0.3,0.4);
}

function startRound() {
  const p1def=CHAR_LIST[selectedCharIdx];

  fighters=[p1,p2];
