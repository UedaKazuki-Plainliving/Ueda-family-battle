  projectiles.length=0; wordProjs.length=0;
  hurdleAttack=null; activeGorilla=null; activeDragon=null; activeBlackHole=null;
  timerSec=99; timerTick=0; koGrace=0;
}

function spawnSpecialEffect(owner, target) {
  switch(owner.def.id) {
    case 'icchi': spawnDragonSword(owner); break;
    case 'soyo':  activateHurdles(owner,target); break;
    case 'otousan': activateWordAttack(owner); break;
    case 'okaasan':
      activeGorilla=new Gorilla(owner,target);
      beep(300,'sawtooth',0.3,0.5); setTimeout(()=>beep(200,'square',0.25,0.4),100);
      break;
  }
}

// ---- Main Loop ----
let _lastLoopTs = 0;
const _FRAME_MS = 1000 / 60;
function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - _lastLoopTs < _FRAME_MS - 1) return; // cap at 60fps on 120Hz displays
  _lastLoopTs = ts;

  if (phase==='intro') {
    drawIntro();
    if (keyOnce('Space')||keyOnce('Enter')){phase='modeselect';beep(440,'sine',0.1);}
    return;
  }
  if (phase==='modeselect') {
    drawModeSelect();
    if (keyOnce('Backspace')||keyOnce('Escape')) {
      if (modeSelectStep===1) { modeSelectStep=0; beep(300,'sine',0.08); }
      else { phase='intro'; beep(300,'sine',0.08); }
      return;
    }
    if (modeSelectStep === 1) {
      // 難易度選択
      const diffs = ['weak','normal','strong'];
      const curIdx = diffs.indexOf(cpuDifficulty);
      if (keyOnce('ArrowUp')||keyOnce('KeyW')) { cpuDifficulty=diffs[Math.max(0,curIdx-1)]; beep(350,'sine',0.08); }
      if (keyOnce('ArrowDown')||keyOnce('KeyS')) { cpuDifficulty=diffs[Math.min(2,curIdx+1)]; beep(350,'sine',0.08); }
      if (keyOnce('Digit1')) { cpuDifficulty='weak'; beep(350,'sine',0.08); }
      if (keyOnce('Digit2')) { cpuDifficulty='normal'; beep(350,'sine',0.08); }
      if (keyOnce('Digit3')) { cpuDifficulty='strong'; beep(350,'sine',0.08); }
      if (keyOnce('Space')||keyOnce('Enter')) {
        modeSelectStep=0; phase='charselect'; selectStep=0; selectedCharIdx=0; cpuCharIdx=1; beep(440,'sine',0.12);
      }
    } else {
      const modeList=['cpu','2p','net'];
      const mi=modeList.indexOf(gameMode);
      if (keyOnce('ArrowUp')||keyOnce('KeyW')) { gameMode=modeList[Math.max(0,mi-1)]; beep(350,'sine',0.08); }
      if (keyOnce('ArrowDown')||keyOnce('KeyS')) { gameMode=modeList[Math.min(2,mi+1)]; beep(350,'sine',0.08); }
      if (keyOnce('Space')||keyOnce('Enter')) {
        if (gameMode==='cpu') { modeSelectStep=1; beep(350,'sine',0.08); }
        else if (gameMode==='2p') { phase='charselect'; selectStep=0; selectedCharIdx=0; cpuCharIdx=1; beep(440,'sine',0.12); }
        else { connectNet(); beep(350,'sine',0.08); }
      }
    }
    return;
  }
  if (phase==='netwait') {
    drawNetWait();
    if (keyOnce('Backspace')||keyOnce('Escape')) {
      if(netWs){try{netWs.close();}catch(e){} netWs=null;}
      phase='modeselect'; beep(300,'sine',0.08);
    }
    return;
  }
  if (phase==='charselect') {
    drawCharSelect();
    if (keyOnce('Backspace')||keyOnce('Escape')) {
      if (gameMode==='net') {
        if(netWs){try{netWs.close();}catch(e){} netWs=null;}
        phase='modeselect'; beep(300,'sine',0.08);
      } else if (selectStep===1) { selectStep=0; beep(300,'sine',0.08); }
      else { modeSelectStep=0; phase='modeselect'; beep(300,'sine',0.08); }
      return;
    }
    if (keyOnce('ArrowLeft')||keyOnce('KeyA')) {
      if (gameMode==='net'||selectStep===0) selectedCharIdx=(selectedCharIdx-1+CHAR_LIST.length)%CHAR_LIST.length;
      else cpuCharIdx=(cpuCharIdx-1+CHAR_LIST.length)%CHAR_LIST.length;
      beep(350,'sine',0.08);
    }
    if (keyOnce('ArrowRight')||keyOnce('KeyD')) {
      if (gameMode==='net'||selectStep===0) selectedCharIdx=(selectedCharIdx+1)%CHAR_LIST.length;
      else cpuCharIdx=(cpuCharIdx+1)%CHAR_LIST.length;
      beep(350,'sine',0.08);
    }
    if (keyOnce('Space')||keyOnce('Enter')||keyOnce('KeyJ')) {
      if (gameMode==='net') {
        if (!netMyReady) {
          netMyCharIdx=selectedCharIdx; netMyReady=true;
          const seedToSend = netPlayerNum===1 ? (netSeed=Date.now()^0xABCD1234) : netSeed;
          if (netWs&&netWs.readyState===1) netWs.send(JSON.stringify({type:'char',idx:selectedCharIdx,seed:seedToSend}));
          beep(440,'sine',0.12);
          if (netOppCharIdx!==-1) startNetFight();
        }
        return;
      }
      if (selectStep===0) {
        selectStep=1; cpuCharIdx=(selectedCharIdx+1)%CHAR_LIST.length;
        beep(440,'sine',0.12);
      } else {
        wins=[0,0];roundNum=1;
        if (gameMode==='2p'&&IS_TOUCH) setup2PTouchCanvas();
        startRound();phase='countdown';
        showFlash(`ROUND ${roundNum}`,80);
        setTimeout(()=>showFlash('FIGHT!',70),1200);
        setTimeout(()=>{phase='fight';},1800);
        beep(523,'sine',0.3,0.4);
      }
    }
    return;
  }

  drawBackground();
  drawScreenFlash();

  if (phase==='fight') {
    if (++timerTick>=60){timerTick=0;timerSec--;}
    const myInput={punch:keys['KeyJ'],kick:keys['KeyK'],left:keys['KeyA'],right:keys['KeyD'],
                   up:keys['KeyW'],down:keys['KeyS'],block:keys['KeyL'],special:keys['Space']};
    if (gameMode==='net'&&netWs&&netWs.readyState===1) netWs.send(JSON.stringify({type:'input',...myInput}));
    if (gameMode==='net'&&netPlayerNum===1&&netWs&&netWs.readyState===1) {
      if (++_syncFrameCount>=60) {
        _syncFrameCount=0;
        netWs.send(JSON.stringify({type:'sync',
          p1x:Math.round(p1.x),p1y:Math.round(p1.y),p1hp:p1.hp,p1sg:p1.specialGauge,
          p2x:Math.round(p2.x),p2y:Math.round(p2.y),p2hp:p2.hp,p2sg:p2.specialGauge}));
      }
    }
    const i1=gameMode==='net'&&netPlayerNum===2?netOppInput:myInput;
    const i2=gameMode==='2p'
      ?{punch:keys['Numpad1'],kick:keys['Numpad2'],block:keys['Numpad3'],special:keys['Numpad0'],
        left:keys['ArrowLeft'],right:keys['ArrowRight'],up:keys['ArrowUp'],down:keys['ArrowDown']}
      :gameMode==='net'?(netPlayerNum===2?myInput:netOppInput)
      :cpuCtrl.update();
    p1.update(p2,i1); p2.update(p1,i2);

    if (p1.specialFired){p1.specialFired=false;spawnSpecialEffect(p1,p2);}
    if (p2.specialFired){p2.specialFired=false;spawnSpecialEffect(p2,p1);}
    if (p1.punchFired&&p1.def.punchIsProjectile){p1.punchFired=false;if(!projectiles.some(p=>p.owner===p1)){p1.def.id==='kuppa'?spawnFire(p1):spawnBaseball(p1);}}
    if (p2.punchFired&&p2.def.punchIsProjectile){p2.punchFired=false;if(!projectiles.some(p=>p.owner===p2)){p2.def.id==='kuppa'?spawnFire(p2):spawnBaseball(p2);}}

    updateProjectiles(p1,p2);
    updateHurdles(p1,p2);
    updateWords(p1,p2);

    if (activeDragon) activeDragon.update();
    if (activeBlackHole) activeBlackHole.update(p1,p2);

    if (activeGorilla) {
      activeGorilla.update();
      if (activeGorilla&&activeGorilla.t>0&&!activeGorilla.atkHit) {
        const gt=activeGorilla.owner===p1?p2:p1;
        const ghb=activeGorilla.hitbox();
        if (ghb) {
          const hurt=gt.hurtbox();
          const ghx=ghb.w<0?ghb.x+ghb.w:ghb.x, ghw=Math.abs(ghb.w);
          if (ghx<hurt.x+hurt.w&&ghx+ghw>hurt.x&&ghb.y<hurt.y+hurt.h&&ghb.y+ghb.h>hurt.y) {
            if (gt.takeHit({dmg:12,stun:20,push:18,type:'special'},activeGorilla.dir)) {
              activeGorilla.atkHit=true;
              spawnHit((activeGorilla.x+gt.x)/2,gt.y-50);
            }
          }
        }
      }
    }

    checkCollision(p1,p2); checkCollision(p2,p1);

    const p1ko=p1.hp<=0,p2ko=p2.hp<=0,timeout=timerSec<=0;
    if (p1ko||p2ko||timeout) {
      const p1tech=p1.state==='special'||p1.state==='super';
      const p2tech=p2.state==='special'||p2.state==='super';
      const anyEffect=p1tech||p2tech||p1.state==='down'||p2.state==='down'||!!activeBlackHole||!!activeDragon||!!hurdleAttack||projectiles.length>0||wordProjs.length>0;
      if (anyEffect&&koGrace<300) { koGrace++; }
      else {
        koGrace=0;
        let p1wins;
        if (timeout) p1wins=p1.hp>p2.hp?true:p1.hp<p2.hp?false:null;
        else if (p2ko&&!p1ko) p1wins=true;
        else if (p1ko&&!p2ko) p1wins=false;
        else p1wins=null;
        if (p1wins===true){
          wins[0]++;
          p1.pose='celebrate'; p2.pose='defeat';
          const wn=gameMode==='net'&&netPlayerNum===2?'相手':p1.def.name;
          showFlash(`${wn} WIN!`,130);
          beep(gameMode==='net'&&netPlayerNum===2?330:523,'sine',0.6,gameMode==='net'&&netPlayerNum===2?0.35:0.4);
        } else if (p1wins===false){
          wins[1]++;
          p2.pose='celebrate'; p1.pose='defeat';
          const wn=gameMode==='net'&&netPlayerNum===1?'相手':gameMode==='2p'||gameMode==='net'?p2.def.name:'CPU';
          showFlash(`${wn} WIN!`,130);
          beep(gameMode==='net'&&netPlayerNum===1?330:523,'sine',0.6,gameMode==='net'&&netPlayerNum===1?0.35:0.4);
        } else{showFlash('DRAW!',130);}
        // Net: player 1 is authoritative for round transitions
        if (gameMode==='net'&&netPlayerNum===1&&netWs&&netWs.readyState===1) {
          netWs.send(JSON.stringify({type:'roundend',wins,p1wins}));
          phase='roundend'; endTimer=200;
        } else if (gameMode==='net'&&netPlayerNum===2) {
          phase='roundend'; endTimer=999999; // wait for nextround message from player 1
        } else {
          phase='roundend'; endTimer=200;
        }
      }
    }
  }

  if (phase==='roundend'||phase==='countdown') {
    if (phase==='roundend'&&--endTimer<=0) {
      // Net player 2 waits for nextround/gameover message from player 1
      if (gameMode==='net'&&netPlayerNum===2) { endTimer=0; }
      else {
        if (wins[0]>=2||wins[1]>=2){
          if (gameMode==='net'&&netPlayerNum===1&&netWs&&netWs.readyState===1)
            netWs.send(JSON.stringify({type:'gameover'}));
          exitToMenu();return;
        }
        roundNum++;startRound();phase='countdown';
        showFlash(`ROUND ${roundNum}`,80);
        setTimeout(()=>showFlash('FIGHT!',70),1200);
        setTimeout(()=>{phase='fight';},1800);
        if (gameMode==='net'&&netPlayerNum===1&&netWs&&netWs.readyState===1)
          netWs.send(JSON.stringify({type:'nextround',roundNum}));
      }
    }
  }

  drawHurdles();
  p1.draw(); p2.draw();
  if (activeGorilla) activeGorilla.draw();
  if (activeDragon) activeDragon.draw();
  if (activeBlackHole) activeBlackHole.draw();
  drawProjectiles();
  drawWords();
  drawEffects();
  drawResultPose();
  drawHUD();
  drawFlashMsg();
  drawSpecialBanner();
  drawSuperFlash();
  drawExitButton();
  if (!IS_TOUCH) {
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('A/D 移動  W ジャンプ  S しゃがみ  J パンチ  K キック  L ガード  Space 必殺技  ※空中キックはガード不可',W/2,H-8);
    // P2 key mapping overlay (PC always visible during fight)
    drawP2KeyHint();
  }
  if (IS_TOUCH && gameMode === '2p') {
    drawMobile2PControls();
  }
}

// ---- Mobile 2P Canvas Controls ----
// Touch tracking for 2P mobile: touches left of 400 → P1, right → P2
const touch2PState = {p1:{},p2:{}};

function initMobile2PTouch() {
  function getCanvasCoords(touch) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (touch.clientX - rect.left) * (W / rect.width),
      y: (touch.clientY - rect.top)  * (CANVAS_H / rect.height)
    };
  }

  // Button definitions for 2P mobile layout — delegate to shared function
  function getButtons() { return getMobile2PButtons(); }

  function hitTest(btn, cx, cy) {
    const dx = cx - btn.cx, dy = cy - btn.cy;
    return dx*dx + dy*dy <= btn.r * btn.r;
  }

  function handleTouch(e) {
    if (gameMode !== '2p') return; // 1P mode: HTML buttons handle input
    e.preventDefault();
    const buttons = getButtons();
    // Reset all button keys
    buttons.forEach(b => { keys[b.key] = false; if (b.key2) keys[b.key2] = false; });
    // Set keys for active touches
    for (let i = 0; i < e.touches.length; i++) {
      const coords = getCanvasCoords(e.touches[i]);
      buttons.forEach(b => {
        if (hitTest(b, coords.x, coords.y)) {
          keys[b.key] = true;
          if (b.key2) keys[b.key2] = true;
        }
      });
    }
  }

  canvas.addEventListener('touchstart',  handleTouch, {passive:false});
  canvas.addEventListener('touchmove',   handleTouch, {passive:false});
  canvas.addEventListener('touchend',    handleTouch, {passive:false});
  canvas.addEventListener('touchcancel', handleTouch, {passive:false});
}

function drawMobile2PControls() {
  const buttons = getMobile2PButtons();
  const top = CANVAS_H === 600 ? 455 : 315;

  // コントロールエリア背景
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, top, W, CANVAS_H - top);

  // 中央分割線
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(W/2, top); ctx.lineTo(W/2, CANVAS_H); ctx.stroke();
  ctx.setLineDash([]);

  // P1/P2 ラベル
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,200,255,0.85)'; ctx.fillText('P1', 40, top+14);
  ctx.fillStyle = 'rgba(255,150,0,0.85)'; ctx.fillText('P2', W-40, top+14);

  buttons.forEach(btn => {
    const active = !!keys[btn.key];
    const isP1 = btn.player === 1;
    const baseColor = isP1 ? 'rgba(0,200,255,' : 'rgba(255,150,0,';
    ctx.beginPath(); ctx.arc(btn.cx, btn.cy, btn.r, 0, Math.PI*2);
    ctx.fillStyle = active ? baseColor+'0.6)' : baseColor+'0.18)';
    ctx.fill();
    ctx.strokeStyle = active ? baseColor+'0.95)' : baseColor+'0.45)';
    ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.cx, btn.cy + 5);
  });
}

        if (inp.special) throw new Error('weak CPU must never use special');
      }
    } finally { cpuDifficulty = saved; }
  });

  t('CPU 弱い: キックを使わない', () => {
    const saved = cpuDifficulty; cpuDifficulty = 'weak';
    try {
      const me = mkF('icchi', false, 90); const opp = mkF('yuuri', true, 90);
      const cpu = new CPU(me, opp);
      for (let i = 0; i < 500; i++) {
        me.state = 'idle'; me.onGround = true; me.hitStun = 0; me.blockStun = 0;
        const inp = cpu.update();
        if (inp.kick) throw new Error('weak CPU must never use kick');
      }
    } finally { cpuDifficulty = saved; }
  });

  t('drawP2KeyHint: P2キー表示テキストが定義されている', () => {
    if (typeof drawP2KeyHint !== 'function') throw new Error('drawP2KeyHint function not found');
  });

  t('getMobile2PButtons: P1とP2のボタンが存在する', () => {
    const btns = getMobile2PButtons();
    const p1btns = btns.filter(b => b.player === 1);
    const p2btns = btns.filter(b => b.player === 2);
    if (p1btns.length === 0) throw new Error('P1 buttons missing');
    if (p2btns.length === 0) throw new Error('P2 buttons missing');
  });

  t('getMobile2PButtons: P1ボタンはx<400に配置', () => {
    const btns = getMobile2PButtons();
    btns.filter(b => b.player === 1).forEach(b => { if (b.cx >= 400) throw new Error(`P1 button cx=${b.cx} must be < 400`); });
  });

  t('getMobile2PButtons: P2ボタンはx>=400に配置', () => {
    const btns = getMobile2PButtons();
    btns.filter(b => b.player === 2).forEach(b => { if (b.cx < 400) throw new Error(`P2 button cx=${b.cx} must be >= 400`); });
  });

  t('EXIT_BTN: 定数が存在する', () => {
    if (typeof EXIT_BTN === 'undefined') throw new Error('EXIT_BTN not defined');
    if (typeof EXIT_BTN.x !== 'number') throw new Error('EXIT_BTN.x missing');
    if (EXIT_BTN.w <= 0) throw new Error('EXIT_BTN.w must be positive');
  });

  t('drawExitButton: 関数が存在する', () => {
    if (typeof drawExitButton !== 'function') throw new Error('drawExitButton function not found');
  });

  t('exitToMenu: 実行するとphaseがmodeselectになる', () => {
    phase = 'fight'; exitToMenu();
    if (phase !== 'modeselect') throw new Error(`phase=${phase}, expected modeselect`);
  });

  // ---- 実行 ----
  _T.forEach(({name,fn}) => {
    try { fn(); _R.push({name,pass:true}); }
    catch(e) { _R.push({name,pass:false,err:e.message}); }
  });

  const passed=_R.filter(r=>r.pass).length, total=_R.length, failed=total-passed;
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;overflow-y:auto;background:#0d1117;color:#e6edf3;font:13px "Consolas","Monaco",monospace;padding:20px 24px;z-index:9999;';
  let h=`<div style="margin-bottom:16px">`;
  h+=`<div style="font-size:20px;font-weight:bold;color:#fff;margin-bottom:6px">大乱闘 ウエダファミリー — Unit Tests</div>`;
  h+=`<div style="font-size:14px;color:${failed===0?'#3fb950':'#f85149'}">`;
  h+=`${passed} / ${total} passed`;
  if(failed>0) h+=` &nbsp;— &nbsp;<strong>${failed} FAILED</strong>`; else h+=' &nbsp;✓ All passed';
  h+=`</div></div>`;
  h+=`<table style="border-collapse:collapse;width:100%;font-size:12px">`;
  _R.forEach(({name,pass,err})=>{
    h+=`<tr style="${pass?'':'background:#2d1515;'}border-bottom:1px solid #21262d">`;
    h+=`<td style="padding:3px 8px;color:${pass?'#3fb950':'#f85149'};width:20px">${pass?'✓':'✗'}</td>`;
    h+=`<td style="padding:3px 8px">${name}</td>`;
    h+=`<td style="padding:3px 8px;color:#f85149">${pass?'':err}</td>`;
    h+=`</tr>`;
  });
  h+=`</table>`;
  div.innerHTML=h;
  document.body.appendChild(div);

} else {
  requestAnimationFrame(ts => { _lastLoopTs = ts; requestAnimationFrame(loop); });
}
</script>
</body>
</html>
